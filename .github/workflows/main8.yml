name: VNC_Cloudflare
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Amunisi Server
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
      - name: Nyalakan Mesin
        run: |
          dd if=/dev/zero of=disk.img bs=1M count=512
          sudo qemu-system-x86_64 -m 2G -drive file=disk.img,format=raw -vnc :0 -vga std &
          sleep 5
          
      - name: Buka Terowongan Cloudflare
        run: |
          echo "🚀 LINK VNC KAMU ADA DI BAWAH (CARI YANG .trycloudflare.com):"
          cloudflared tunnel --url tcp://localhost:5900
          
