name: Kobra_Putih_noVNC
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pasang Taring (Cloudflared)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Panggil Kobra Putih (Android 7.1 + noVNC Ready)
        run: |
          # Kita pakai image 'remoteview' karena dia sudah include noVNC di port 8080
          # Kita kasih RAM 10GB biar ngebut kayak motor balap
          docker run -d -p 8080:8080 \
            --memory="10g" \
            --name mesin-kobra-putih \
            remoteview/docker-android-x86-7.1.1
          
          echo "✅ Kobra Putih sedang pemanasan... Tunggu 40 detik Zan!"
          sleep 40
          
      - name: 3. Aktifkan Racun (Cloudflare Tunnel)
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, COPY LINK .trycloudflare.com DI BAWAH INI:"
          echo "-------------------------------------------------------"
          # Kita arahkan tunnel ke port 8080 (port standar image ini)
          cloudflared tunnel --url http://localhost:8080
          
