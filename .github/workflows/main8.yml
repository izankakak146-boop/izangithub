name: VNC_Cloudflare_Lengkap
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Alat Tempur
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
      - name: 2. Nyalakan Mesin (Anti-Gagal)
        run: |
          # Buat disk dummy 1GB
          dd if=/dev/zero of=disk.img bs=1M count=1024
          # Jalankan QEMU dengan display none biar gak error config client.conf
          sudo qemu-system-x86_64 \
            -m 2G \
            -drive file=disk.img,format=raw \
            -vnc :0 \
            -vga std \
            -display none \
            -daemonize
          echo "✅ Mesin Berhasil Dinyalakan di Background!"
          sleep 5
          
      - name: 3. Buka Terowongan & Siapkan Link
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, COPY LINK DI BAWAH INI KE VNC VIEWER:"
          echo "⚠️  HAPUS 'https://' NYA SAAT MASUKKAN KE APLIKASI!"
          echo "-------------------------------------------------------"
          # Jalankan tunnel
          cloudflared tunnel --url tcp://localhost:5900
          
