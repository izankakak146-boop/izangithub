name: Android9_Fix_Final_Izan
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Amunisi Lengkap
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 novnc websockify qemu-utils
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Download ISO Android 9
        run: |
          wget -O android9.iso "https://downloads.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso"

      - name: 3. Goreng Mesin (Fix USB Bus & VNC)
        run: |
          qemu-img create -f qcow2 android.qcow2 10G
          
          # Tambahan: -device usb-ehci untuk memperbaiki error No USB Bus
          sudo qemu-system-x86_64 \
            -m 8G \
            -smp 2 \
            -cpu host \
            -enable-kvm \
            -drive file=android.qcow2,format=qcow2 \
            -cdrom android9.iso \
            -device usb-ehci,id=usbbus \
            -device usb-tablet,bus=usbbus.0 \
            -vnc 127.0.0.1:0 \
            -vga virtio \
            -display none &

          sleep 15
          # Pastikan websockify nembak ke localhost port 5900
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          
          echo "✅ Mesin lagi booting dengan USB Fix..."
          sleep 90

      - name: 4. Sajikan Link VVIP
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, COBA LAGI SEKARANG!"
          echo "USB Bus sudah diperbaiki, mesin harusnya gak crash."
          echo "-------------------------------------------------------"
          cloudflared tunnel --url http://127.0.0.1:6080
          
