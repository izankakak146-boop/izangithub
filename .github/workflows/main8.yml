name: Jurus_Ular_Kobra_noVNC
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pasang Taring (Cloudflared)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Panggil Ular (Android 7.1 noVNC)
        run: |
          # Kita pakai image dari 'accetto' karena ini paling stabil buat noVNC
          # Ram kita hajar 10GB biar kenceng banget!
          docker run -d -p 6080:6080 \
            --memory="10g" \
            --cpus="4.0" \
            --name mesin-kobra \
            accetto/ubuntu-vnc-xfce-g3:latest
          
          echo "✅ Ular sedang merayap... Tunggu 20 detik!"
          sleep 20
          
      - name: 3. Aktifkan Racun (Cloudflare Tunnel)
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, BUKA LINK .trycloudflare.com DI BAWAH INI:"
          echo "Buka di Chrome HP, langsung muncul layar browser!"
          echo "-------------------------------------------------------"
          # Tunneling ke port 6080 (Web Browser noVNC)
          cloudflared tunnel --url http://localhost:6080
          
