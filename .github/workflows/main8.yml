name: Android_Final_Fix
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
      - name: 2. Jalankan Docker Android (Versi Fix)
        run: |
          # Saya pakai versi x86 supaya kencang di prosesor Xeon/EPYC GitHub
          docker run -d -p 6080:6080 \
            --memory="4g" \
            --cpus="2.0" \
            -e EMULATOR_DEVICE="Nexus 5" \
            -e WEB_VNC=true \
            --name android-mesin \
            budtmo/docker-android-x86-7.1.1
          
          echo "✅ Menunggu mesin pemanasan..."
          sleep 45
          
      - name: 3. Ambil Link noVNC
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, COPY LINK DI BAWAH INI:"
          echo "-------------------------------------------------------"
          cloudflared tunnel --url http://localhost:6080
          
