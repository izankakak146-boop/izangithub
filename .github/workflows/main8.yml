name: Android_Browser_Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
      - name: 2. Jalankan Android (Versi Browser noVNC)
        run: |
          # Kita pakai versi yang jalannya di web port 6080
          # Memory saya kasih 6GB biar ngebut sesuai spek Xeon GitHub yang kamu bilang
          docker run -d -p 6080:6080 \
            --memory="6g" \
            --shm-size="2g" \
            -e WEB_VNC=true \
            --name mesin-izan \
            tyanyulr/docker-android-novnc:latest
          
          echo "✅ Menunggu mesin panas... Sabar 30 detik Zan!"
          sleep 30
          
      - name: 3. Ambil Link Browser Kamu
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, BUKA LINK INI DI CHROME HP:"
          echo "Nggak perlu VNC Viewer, langsung klik link di bawah!"
          echo "-------------------------------------------------------"
          # Kita arahkan ke port 6080 buat noVNC
          cloudflared tunnel --url http://localhost:6080
          
