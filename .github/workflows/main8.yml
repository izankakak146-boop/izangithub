name: Android_Real_noVNC
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Install Alat Terowongan (Cloudflared)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
      - name: 2. Tarik Android Real (Docker + noVNC)
        run: |
          # Kita panggil Docker Android versi 9.0. Otomatis anti-ribet dan tanpa QEMU mentahan!
          docker run -d -p 6080:6080 -e EMULATOR_DEVICE="Nexus 5" -e WEB_VNC=true --name android-mesin budtmo/docker-android:emulator_9.0
          
          echo "✅ Mesin Android sedang dipanaskan di background..."
          # Kasih waktu sebentar biar server web noVNC-nya siap
          sleep 20
          
      - name: 3. Buka Link noVNC ke Browser Kamu
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, COPY LINK DI BAWAH INI LANGSUNG KE BROWSER HP (CHROME):"
          echo "⚠️ Nggak perlu VNC Viewer lagi! Cari link yang ada .trycloudflare.com"
          echo "-------------------------------------------------------"
          # Kita arahkan terowongannya langsung ke port web (6080)
          cloudflared tunnel --url http://localhost:6080
          
