name: Gemini Nano (Jalur Pintas Edition)
on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Masukkan Alamat FalixNodes'
        required: true
        default: 'alynizan.falixsrv.me'

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          # DATA SETUP
          SERVER_HOST = os.getenv('INPUT_SERVER_ADDRESS')
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          Movements = require('mineflayer-pathfinder').Movements
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              print(f"🚀 Menghubungi Server: {SERVER_HOST}")
              bot = mineflayer.createBot({
                  'host': SERVER_HOST,
                  'port': 25565,
                  'username': 'Gemini_Nano_Izan',
                  'version': '1.12.2'
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  bot.chat("Zan! Gemini Nano On-Fire! 🔥 Sebut 'Ikut' kalau mau ane tempel!")
                  mcData = require('minecraft-data')(bot.version)
                  movements = Movements(bot, mcData)
                  # JALUR PINTAS: Biar bot bisa loncat & hancurin blok penghalang saat ngejar
                  movements.canDig = True 
                  bot.pathfinder.setMovements(movements)

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()

                  # JALUR PINTAS IKUT (FORCE FOLLOW)
                  if "ikut" in msg or "sini" in msg:
                      player = bot.players[username]
                      if player and player.entity:
                          bot.chat(f"Gak usah lari, {username}! Ane tempel terus sekarang! 🏃‍♂️💨")
                          # GoalFollow(target, radius) -> Radius 1 biar nempel banget
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 1), True)
                      else:
                          bot.chat("Zan, kamu kejauhan! Sini deketan dulu biar ane liat!")
                      return

                  if "diam" in msg or "stop" in msg:
                      bot.chat("Siaaap, ane ngerem di sini. Jangan kangen ya! 💅")
                      bot.pathfinder.setGoal(None)
                      return

                  # JALUR PINTAS NGOBROL (AI RESPONSE)
                  try:
                      prompt = (
                          f"Kamu adalah Gemini Nano, pendamping Minecraft {username}. "
                          "Gayamu gaul, sedikit jutek tapi setia. Kamu harus merespon chat ini "
                          f"dengan sangat singkat dan seru: {message}"
                      )
                      response = model.generate_content(prompt)
                      bot.chat(response.text)
                  except:
                      # Jika API Error, tetap jawab biar gak dikira sombong
                      bot.chat("Duh, lagi mikir keras nih! Jangan ganggu dulu bentar! 😵‍💫")

              @On(bot, 'death')
              def handle_death(*args):
                  bot.chat("Waduuuh mokat! Tunggu Zan, ane otw balik dari neraka! 🔥💀")

              @On(bot, 'end')
              def handle_end(*args):
                  time.sleep(10)
                  start_bot()

          start_bot()
          time.sleep(21600)
          EOF

      - name: Run Bot
        env:
          INPUT_SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
        run: python bot.py
        
