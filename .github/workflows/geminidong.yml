name: Gemini Minecraft Ultimate (6 Jam Non-Stop)
on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Masukkan Alamat Server Aternos'
        required: true
        default: 'izankakak.aternos.me'

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          # DATA DARI USER
          SERVER_HOST = os.getenv('INPUT_SERVER_ADDRESS')
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          Movements = require('mineflayer-pathfinder').Movements
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              print(f"🚀 Mencoba menembus server: {SERVER_HOST}...")
              
              bot = mineflayer.createBot({
                  'host': SERVER_HOST,
                  'port': 25565,
                  'username': 'Gemini_Bot_Izan',
                  'checkTimeoutInterval': 90000,
                  'version': False, # Deteksi versi otomatis
                  'hideErrors': True
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  print(f"✅ AKHIRNYA MASUK! Bot standby di {SERVER_HOST}")
                  bot.chat("Zan! Ane udah mendarat. Siap kawal 6 jam!")
                  mcData = require('minecraft-data')(bot.version)
                  bot.pathfinder.setMovements(Movements(bot, mcData))

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()
                  
                  if "ikut" in msg:
                      player = bot.players[username]
                      if player and player.entity:
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 2), True)
                          bot.chat(f"Otw kawal bang {username}!")
                  elif "diam" in msg:
                      bot.pathfinder.setGoal(None)
                      bot.chat("Siap, ngerem dulu di sini.")
                  else:
                      try:
                          res = model.generate_content(f"Kamu bot Minecraft. Jawab singkat & gaul: {message}")
                          bot.chat(res.text)
                      except:
                          pass

              @On(bot, 'end')
              def handle_end(*args):
                  print("⚠️ Koneksi putus (ECONNRESET/Lainnya). Reconnect dalam 10 detik...")
                  time.sleep(10)
                  start_bot()

              @On(bot, 'error')
              def handle_error(this, err, *args):
                  # Mengabaikan error koneksi agar tidak crash
                  pass

          # Jalankan bot
          start_bot()

          # Menjaga script hidup selama 6 jam
          start_time = time.time()
          while (time.time() - start_time) < 21600:
              time.sleep(1)
          EOF

      - name: Run Bot
        env:
          INPUT_SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
        run: python bot.py
        
