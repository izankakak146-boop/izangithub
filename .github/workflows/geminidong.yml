name: Gemini Nano Aternos Shortcut
on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Masukkan Alamat Aternos Kamu (Contoh: izan.aternos.me)'
        required: true

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Standby 6 jam
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          # SETUP KONEKSI
          SERVER_HOST = os.getenv('INPUT_SERVER_ADDRESS')
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          Movements = require('mineflayer-pathfinder').Movements
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              print(f"🚀 Menuju Aternos: {SERVER_HOST}")
              bot = mineflayer.createBot({
                  'host': SERVER_HOST,
                  'port': 25565,
                  'username': 'Gemini_Nano_Izan',
                  'version': '1.12.2', # Tetap pakai Java 1.12.2 biar enteng
                  'checkTimeoutInterval': 60000 # Lebih peka biar gak gampang DC
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  bot.chat("Zan! Gemini Nano balik ke Aternos nih. Gas mabar lagi! 🔥")
                  mcData = require('minecraft-data')(bot.version)
                  movements = Movements(bot, mcData)
                  movements.canDig = True # Jalur pintas: bisa gali blok penghalang
                  bot.pathfinder.setMovements(movements)

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()

                  # JALUR PINTAS IKUT (FORCE FOLLOW)
                  if "ikut" in msg or "sini" in msg:
                      player = bot.players[username]
                      if player and player.entity:
                          bot.chat(f"Siap {username}, ane tempel ketat sekarang! 🏃‍♂️💨")
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 1), True)
                      else:
                          bot.chat("Zan, kamu di mana? Deketin ane dulu!")
                      return

                  if "diam" in msg or "stop" in msg:
                      bot.chat("Oke, ane ngerem di sini. Jagain ya! 💅")
                      bot.pathfinder.setGoal(None)
                      return

                  # JALUR PINTAS NGOBROL (AI RESPONSE)
                  try:
                      prompt = (
                          f"Kamu adalah Gemini Nano, pendamping Minecraft {username}. "
                          "Gayamu gaul, setia, tapi agak jutek karena baru pindah dari Falix. "
                          f"Jawab chat ini singkat dan seru: {message}"
                      )
                      response = model.generate_content(prompt)
                      bot.chat(response.text)
                  except:
                      bot.chat("Aduh, otak ane lagi blank! Kebanyakan pindah server! 😵‍💫")

              @On(bot, 'death')
              def handle_death(*args):
                  bot.chat("Waduh mokat lagi! Aternos banyak monster ya? Otw balik! 💀")

              @On(bot, 'kicked')
              def handle_kicked(this, reason, *args):
                  print(f"⚠️ Di-kick Aternos karena: {reason}")
                  time.sleep(10)
                  start_bot()

              @On(bot, 'end')
              def handle_end(*args):
                  print("⚠️ Koneksi putus, mencoba masuk lagi...")
                  time.sleep(10)
                  start_bot()

          start_bot()
          time.sleep(21600)
          EOF

      - name: Run Bot
        env:
          INPUT_SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
        run: python bot.py
        
