name: Gemini Nano Aternos (Fix ENOTFOUND)
on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Masukkan Alamat Aternos (TANPA PORT)'
        required: true
        default: 'izankakak-nrDn.aternos.me'
      server_port:
        description: 'Masukkan Port (Cek di panel Aternos)'
        required: true
        default: '21817'

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          # DATA DARI GITHUB
          SERVER_HOST = os.getenv('INPUT_SERVER_ADDRESS')
          SERVER_PORT = int(os.getenv('INPUT_SERVER_PORT'))
          
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              print(f"🚀 Mencoba masuk ke Aternos: {SERVER_HOST}:{SERVER_PORT}")
              bot = mineflayer.createBot({
                  'host': SERVER_HOST,
                  'port': SERVER_PORT,
                  'username': 'Gemini_Nano_Izan',
                  'version': '1.12.2'
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  bot.chat("Zan! Aternos emang rewel, tapi ane berhasil tembus! 🔥")

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()

                  if "ikut" in msg:
                      player = bot.players[username]
                      if player and player.entity:
                          bot.chat("Siap Zan, nempel terus! 🏃‍♂️💨")
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 1), True)
                      return

                  try:
                      res = model.generate_content(f"Jawab gaul & singkat: {message}")
                      bot.chat(res.text)
                  except: pass

              @On(bot, 'error')
              def handle_error(this, err, *args):
                  print(f"❌ Error detected: {err}")

              @On(bot, 'end')
              def handle_end(*args):
                  time.sleep(10)
                  start_bot()

          start_bot()
          time.sleep(21600)
          EOF

      - name: Run Bot
        env:
          INPUT_SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
          INPUT_SERVER_PORT: ${{ github.event.inputs.server_port }}
        run: python bot.py
        
