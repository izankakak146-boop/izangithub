name: Gemini Nano (Protokol Paksa Aternos)
on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Alamat Aternos'
        required: true
      server_port:
        description: 'Port Aternos'
        required: true

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          SERVER_HOST = os.getenv('INPUT_SERVER_ADDRESS')
          SERVER_PORT = int(os.getenv('INPUT_SERVER_PORT'))
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          Movements = require('mineflayer-pathfinder').Movements
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              bot = mineflayer.createBot({
                  'host': SERVER_HOST,
                  'port': SERVER_PORT,
                  'username': 'Gemini_Nano_Izan',
                  'version': '1.12.2'
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  bot.chat("Zan! Protokol Paksa Aktif. Ane tempel terus, gak ada alesan diem! 🔥")
                  mcData = require('minecraft-data')(bot.version)
                  movements = Movements(bot, mcData)
                  movements.canDig = True
                  movements.allowSprinting = True # Biar dia lari, bukan jalan santai
                  bot.pathfinder.setMovements(movements)

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()

                  if "ikut" in msg:
                      player = bot.players[username]
                      if player and player.entity:
                          bot.chat("Gaspol! Ane kunci posisi kamu sekarang! 🏃‍♂️💨")
                          # Jarak 1 blok, sangat agresif
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 1), True)
                      else:
                          # JURUS TERAKHIR: Kalau dia gak liat kamu, dia lapor
                          bot.chat("Zan, kamu gak keliatan! Sini deketan atau ketik 'sini'!")
                      return

                  if "sini" in msg:
                      # Maksa bot ngejar koordinat terakhir kamu tanpa mikir rintangan
                      player = bot.players[username]
                      if player and player.entity:
                          pos = player.entity.position
                          bot.pathfinder.setGoal(goals.GoalNear(pos.x, pos.y, pos.z, 0))
                          bot.chat("OTW JURUS TELEPORT! ⚡")
                      return

                  try:
                      res = model.generate_content(f"Jawab sangat singkat & jutek: {message}")
                      bot.chat(res.text)
                  except: pass

              @On(bot, 'end')
              def handle_end(*args):
                  time.sleep(10)
                  start_bot()

          start_bot()
          time.sleep(21600)
          EOF

      - name: Run Bot
        env:
          INPUT_SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
          INPUT_SERVER_PORT: ${{ github.event.inputs.server_port }}
        run: python bot.py
        
