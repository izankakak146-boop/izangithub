name: Gemini Minecraft Runner (Direct Tunnel)
on:
  workflow_dispatch:
    inputs:
      tunnel_address:
        description: 'Masukkan Alamat LocalTunnel (tanpa https://)'
        required: true
        default: 'xxxx-xxxx.localtunnel.me'

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          TUNNEL_HOST = os.getenv('INPUT_TUNNEL_ADDRESS')
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          Movements = require('mineflayer-pathfinder').Movements
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              print(f"🚀 Menghubungi Jalur Rahasia: {TUNNEL_HOST}...")
              
              bot = mineflayer.createBot({
                  'host': TUNNEL_HOST,
                  'port': 443, # LocalTunnel pakai port 443 (HTTPS)
                  'username': 'Gemini_Bot_Izan',
                  'version': False
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  print(f"✅ TEMBUS! Bot sudah di samping kamu, Zan!")
                  bot.chat("Halo Zan! Akhirnya bisa mabar juga tanpa Aternos!")
                  mcData = require('minecraft-data')(bot.version)
                  bot.pathfinder.setMovements(Movements(bot, mcData))

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()
                  
                  if "ikut" in msg:
                      player = bot.players[username]
                      if player and player.entity:
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 2), True)
                          bot.chat("Gas!")
                  else:
                      try:
                          res = model.generate_content(f"Jawab singkat: {message}")
                          bot.chat(res.text)
                      except:
                          pass

              @On(bot, 'end')
              def handle_end(*args):
                  print("⚠️ Putus, coba lagi...")
                  time.sleep(5)
                  start_bot()

          start_bot()
          start_time = time.time()
          while (time.time() - start_time) < 21600:
              time.sleep(1)
          EOF

      - name: Run Bot
        env:
          INPUT_TUNNEL_ADDRESS: ${{ github.event.inputs.tunnel_address }}
        run: python bot.py
        
