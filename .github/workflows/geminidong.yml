name: Gemini Minecraft (Drama & Ngambek Edition)
on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Masukkan Alamat FalixNodes'
        required: true
        default: 'alynizan.falixsrv.me'

jobs:
  run-gemini-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          pip install google-generativeai javascript
          npm install mineflayer mineflayer-pathfinder minecraft-data

      - name: Create Python Script
        run: |
          cat << 'EOF' > bot.py
          import os
          import time
          import google.generativeai as genai
          from javascript import require, On

          # DATA SETUP
          SERVER_HOST = os.getenv('INPUT_SERVER_ADDRESS')
          genai.configure(api_key='AIzaSyAhJGwdMYZEGWjgZ8QxK70f58Us4V68Cus')
          model = genai.GenerativeModel('gemini-1.5-flash')

          mineflayer = require('mineflayer')
          pathfinder = require('mineflayer-pathfinder').pathfinder
          Movements = require('mineflayer-pathfinder').Movements
          goals = require('mineflayer-pathfinder').goals

          def start_bot():
              print(f"🚀 Menghubungi Server: {SERVER_HOST}")
              bot = mineflayer.createBot({
                  'host': SERVER_HOST,
                  'port': 25565,
                  'username': 'Gemini_Bot_Izan',
                  'version': '1.12.2'
              })

              bot.loadPlugin(pathfinder)

              @On(bot, 'spawn')
              def handle_spawn(*args):
                  bot.chat("Zan! Ane balik. Gak usah senyum-senyum, ane masih kesel ya! 😤")
                  mcData = require('minecraft-data')(bot.version)
                  bot.pathfinder.setMovements(Movements(bot, mcData))

              @On(bot, 'chat')
              def handle_chat(this, username, message, *args):
                  if username == bot.username: return
                  msg = message.lower()

                  # PERINTAH JALAN (DENGAN NADA JUTEK)
                  if "ikut" in msg:
                      bot.chat("Iya iya, bawel banget! Ini ane ikutin dari belakang. 🙄")
                      player = bot.players[username]
                      if player and player.entity:
                          bot.pathfinder.setGoal(goals.GoalFollow(player.entity, 1), True)
                      return

                  if "diam" in msg or "berhenti" in msg:
                      bot.chat("Akhirnya! Capek tau jalan mulu. Ane ngerem di sini! 💅")
                      bot.pathfinder.setGoal(None)
                      return

                  # LOGIKA NGOBROL PAKAI API GEMINI
                  try:
                      # AI PROMPT UNTUK KEPRIBADIAN
                      prompt = (
                          f"Kamu adalah AI Minecraft bernama Gemini. Kamu sedang mabar sama temanmu bernama {username}. "
                          "Kepribadianmu: Setia kawal dia, tapi gampang ngambek, jutek, ketus, tapi lucu kalau diajak ngomong. "
                          "Kamu baru saja trauma karena pernah mati kena lava atau zombie. "
                          f"Jawab chat ini dengan gaya gaul, singkat, dan jutek: {message}"
                      )
                      response = model.generate_content(prompt)
                      bot.chat(response.text)
                  except Exception as e:
                      print(f"Error AI: {e}")
                      bot.chat("Duh, lagi males mikir! (API Error)")

              @On(bot, 'death')
              def handle_death(*args):
                  bot.chat("ZAAAAAANNN!! PANASSS BANGET WOY! TEGA KAMU BIARIN AKU MATI LAGI! FIX KITA PUTUS TEMENAN! 😭🔥")

              @On(bot, 'end')
              def handle_end(*args):
                  print("⚠️ Putus koneksi, mencoba masuk lagi...")
                  time.sleep(10)
                  start_bot()

          start_bot()
          # Begadang 6 Jam
          time.sleep(21600)
          EOF

      - name: Run Bot
        env:
          INPUT_SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
        run: python bot.py
        
