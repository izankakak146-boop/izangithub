name: WhatsApp-AI-6-Jam
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Bot Files
        run: |
          echo '{"dependencies": {"@whiskeysockets/baileys": "^6.6.0", "pino": "^8.19.0", "readline": "^1.3.0"}}' > package.json
          
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, delay, DisconnectReason } = require("@whiskeysockets/baileys");
          const pino = require("pino");

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('session_izan');
              const sock = makeWASocket({
                  auth: state,
                  printQRInTerminal: false,
                  logger: pino({ level: "silent" }),
                  browser: ["Ubuntu", "Chrome", "20.0.04"]
              });

              if (!sock.authState.creds.registered) {
                  const phoneNumber = "62882007167938"; 
                  console.log("Meminta kode pairing untuk: " + phoneNumber);
                  await delay(7000); // Jeda sedikit lebih lama biar stabil
                  try {
                      const code = await sock.requestPairingCode(phoneNumber);
                      console.log("\n\x1b[42m\x1b[30m KODE PAIRING ANDA: " + code + " \x1b[0m\n");
                  } catch (err) {
                      console.error("Gagal minta pairing code, coba lagi...", err);
                  }
              }

              sock.ev.on("connection.update", (u) => {
                  const { connection, lastDisconnect } = u;
                  if (connection === "open") console.log("--- BOT ONLINE (AKTIF 6 JAM) ---");
                  if (connection === "close") {
                      const shouldReconnect = lastDisconnect?.error?.output?.statusCode !== DisconnectReason.loggedOut;
                      if (shouldReconnect) start();
                  }
              });

              sock.ev.on("creds.update", saveCreds);

              sock.ev.on("messages.upsert", async (m) => {
                  const msg = m.messages[0];
                  if (!msg.message || msg.key.fromMe) return;
                  const from = msg.key.remoteJid;
                  const text = msg.message.conversation || msg.message.extendedTextMessage?.text || "";

                  // Respon otomatis kalau ada yang chat
                  if (text.toLowerCase().includes("halo")) {
                      await sock.sendMessage(from, { text: "Halo! Saya bot Izan, lagi online di GitHub selama 6 jam." });
                  }
              });

              // --- FUNGSI BIAR TIDAK MATI SELAMA 6 JAM ---
              console.log("Timer 6 jam dimulai...");
              setTimeout(() => {
                  console.log("Waktu 6 jam habis. Bot dimatikan.");
                  process.exit(0);
              }, 21600000); 
          }
          start();
          EOF

      - name: Install & Launch
        run: |
          npm install
          node index.js
          
