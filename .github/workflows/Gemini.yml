name: Bot WA Izan Nonstop
on:
  workflow_dispatch:
    inputs:
      nomor_wa:
        description: 'Masukkan Nomor WA (628xxx)'
        required: true

jobs:
  get-code:
    runs-on: ubuntu-latest
    steps:
      - name: Create Script and Run
        run: |
          # 1. Bikin file index.js otomatis
          cat <<EOF > index.js
          const { default: makeWASocket, useMultiFileAuthState, delay } = require('@whiskeysockets/baileys');
          const pino = require('pino');
          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('session_temp');
              const sock = makeWASocket({
                  auth: state,
                  logger: pino({ level: 'silent' }),
                  browser: ["Ubuntu", "Chrome", "20.0.04"]
              });
              const phoneNumber = "${{ github.event.inputs.nomor_wa }}";
              
              sock.ev.on('creds.update', saveCreds);

              console.log("Menghubungkan ke WA... Tunggu 10 detik...");
              await delay(10000); // Kasih jeda lebih lama biar gak dikira spam

              try {
                  const code = await sock.requestPairingCode(phoneNumber);
                  console.log('\n========================================');
                  console.log('KODE PAIRING WA IZAN: ' + code);
                  console.log('========================================\n');
                  
                  // Biar melek terus setelah dapet kode
                  console.log("Bot akan stand-by selama 6 jam...");
                  await delay(21600000); // 6 jam dalam milidetik
              } catch (e) { 
                  console.log("Error: " + e.message); 
                  process.exit(1); 
              }
          }
          start();
          EOF

          # 2. Install dan Jalankan
          npm init -y
          npm install @whiskeysockets/baileys pino
          node index.js
          
