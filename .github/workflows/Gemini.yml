name: WhatsApp-AI-Izan-Fixed
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate Bot Files
        run: |
          echo '{"dependencies": {"@whiskeysockets/baileys": "^6.6.0", "pino": "^8.19.0", "readline": "^1.3.0"}}' > package.json
          
          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, delay, DisconnectReason, fetchLatestBaileysVersion } = require("@whiskeysockets/baileys");
          const pino = require("pino");

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('session_izan');
              const { version } = await fetchLatestBaileysVersion();
              
              const sock = makeWASocket({
                  version,
                  auth: state,
                  printQRInTerminal: false,
                  logger: pino({ level: "silent" }),
                  // Pakai identitas Chrome Mobile supaya pairing lebih lancar
                  browser: ["Chrome (Linux)", "Chrome", "110.0.5481.177"]
              });

              if (!sock.authState.creds.registered) {
                  const phoneNumber = "62882007167938"; 
                  console.log("Menghubungkan ke server WhatsApp untuk nomor: " + phoneNumber);
                  
                  // Fungsi minta kode dengan pengulangan jika gagal
                  let codeSent = false;
                  while (!codeSent) {
                      try {
                          await delay(10000); // Jeda 10 detik biar koneksi stabil dulu
                          const code = await sock.requestPairingCode(phoneNumber);
                          console.log("\n\x1b[42m\x1b[30m KODE PAIRING ANDA: " + code + " \x1b[0m\n");
                          codeSent = true;
                      } catch (err) {
                          console.log("Gagal meminta kode, mencoba lagi dalam 5 detik...");
                          await delay(5000);
                      }
                  }
              }

              sock.ev.on("connection.update", (u) => {
                  const { connection, lastDisconnect } = u;
                  if (connection === "open") {
                      console.log("--- BOT ONLINE (AKTIF 6 JAM) ---");
                  }
                  if (connection === "close") {
                      const reason = lastDisconnect?.error?.output?.statusCode;
                      console.log("Koneksi tertutup, alasan:", reason);
                      if (reason !== DisconnectReason.loggedOut) start();
                  }
              });

              sock.ev.on("creds.update", saveCreds);

              sock.ev.on("messages.upsert", async (m) => {
                  const msg = m.messages[0];
                  if (!msg.message || msg.key.fromMe) return;
                  const from = msg.key.remoteJid;
                  const text = (msg.message.conversation || msg.message.extendedTextMessage?.text || "").toLowerCase();

                  if (text === "ping") {
                      await sock.sendMessage(from, { text: "Pong! Bot Izan masih hidup kok." });
                  }
              });

              // Jaga biar tetap hidup 6 jam
              setTimeout(() => {
                  console.log("Waktu 6 jam habis.");
                  process.exit(0);
              }, 21600000); 
          }

          start().catch(err => console.error("Error fatal:", err));
          EOF

      - name: Install & Launch
        run: |
          npm install
          node index.js
          
