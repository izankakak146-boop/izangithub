name: Bot WA Izan Final Reborn
on:
  workflow_dispatch:
    inputs:
      nomor_wa:
        description: 'Masukkan Nomor WA (628xxx)'
        required: true

jobs:
  get-code:
    runs-on: ubuntu-latest
    steps:
      - name: Create Script and Run
        run: |
          cat <<EOF > index.js
          const { default: makeWASocket, useMultiFileAuthState, delay, fetchLatestBaileysVersion, makeCacheableSignalKeyStore } = require('@whiskeysockets/baileys');
          const pino = require('pino');

          async function start() {
              // Ganti nama folder jadi 'session_reborn' biar fresh total
              const { state, saveCreds } = await useMultiFileAuthState('session_reborn');
              const { version, isLatest } = await fetchLatestBaileysVersion();
              
              console.log("Menggunakan WA Versi: " + version + " (Latest: " + isLatest + ")");

              const sock = makeWASocket({
                  auth: {
                    creds: state.creds,
                    keys: makeCacheableSignalKeyStore(state.keys, pino({ level: 'silent' })),
                  },
                  printQRInTerminal: false,
                  logger: pino({ level: 'silent' }),
                  // Pakai identitas Chrome paling standar biar gak dicurigai
                  browser: ["Ubuntu", "Chrome", "120.0.0.0"]
              });

              const phoneNumber = "${{ github.event.inputs.nomor_wa }}";
              sock.ev.on('creds.update', saveCreds);

              await delay(10000); 

              try {
                  const code = await sock.requestPairingCode(phoneNumber);
                  console.log('\n========================================');
                  console.log('KODE PAIRING BARU: ' + code);
                  console.log('========================================\n');
                  
                  // Menjaga agar GitHub tetap hidup 6 jam
                  await delay(21600000); 
              } catch (e) { 
                  console.log("Error: " + e.message);
                  process.exit(1); 
              }
          }
          start();
          EOF

          npm init -y
          npm install @whiskeysockets/baileys pino
          node index.js
          
