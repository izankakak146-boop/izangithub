name: Bot WA Izan Sultan Final
on:
  workflow_dispatch:
    inputs:
      nomor_wa:
        description: 'Masukkan Nomor WA (628xxx)'
        required: true

jobs:
  get-code:
    runs-on: ubuntu-latest
    steps:
      - name: Create Script and Run
        run: |
          # 1. Bikin file index.js otomatis dengan folder session baru
          cat <<EOF > index.js
          const { default: makeWASocket, useMultiFileAuthState, delay, fetchLatestBaileysVersion } = require('@whiskeysockets/baileys');
          const pino = require('pino');

          async function start() {
              // Pakai folder 'session_final' biar fresh dan nggak gagal pair
              const { state, saveCreds } = await useMultiFileAuthState('session_final');
              const { version } = await fetchLatestBaileysVersion();
              
              const sock = makeWASocket({
                  auth: state,
                  version,
                  logger: pino({ level: 'silent' }),
                  // Ganti jadi Chrome Windows biar lebih stabil salaman sama WA
                  browser: ["Windows", "Chrome", "110.0.5481.178"]
              });

              const phoneNumber = "${{ github.event.inputs.nomor_wa }}";
              sock.ev.on('creds.update', saveCreds);

              console.log("Menghubungkan ke server WA... Versi: " + version);
              await delay(10000); 

              try {
                  console.log("Minta kode baru untuk: " + phoneNumber);
                  const code = await sock.requestPairingCode(phoneNumber);
                  console.log('\n========================================');
                  console.log('BERHASIL! KODE PAIRING WA IZAN:');
                  console.log('👉 ' + code + ' 👈');
                  console.log('========================================\n');
                  
                  console.log("CEPAT MASUKKAN KODE KE WA KAMU SEKARANG!");
                  console.log("Bot akan standby selama 6 jam...");
                  
                  // Menjaga GitHub tetap melek 6 jam
                  await delay(21600000); 
              } catch (e) { 
                  console.log("\n❌ GAGAL: " + e.message);
                  process.exit(1); 
              }
          }
          start();
          EOF

          # 2. Install library
          npm init -y
          npm install @whiskeysockets/baileys pino

          # 3. Jalankan
          node index.js
          
