name: Linux-CRD-Android-Zan
on: 
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Masukkan Kode CRD (Debian Linux)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Siapkan Lingkungan Linux
      run: |
        sudo apt update
        # Pasang Desktop ringan (XFCE) dan Chrome Remote Desktop
        sudo apt install xfce4 xfce4-goodies desktop-base chrome-remote-desktop -y
        
    - name: Konfigurasi Desktop
      run: |
        # Supaya tampilan XFCE muncul saat login CRD
        echo "exec startxfce4" > ~/.xsession
        sudo chmod +x ~/.xsession
        
    - name: Jalankan CRD (Gunakan Kode Kamu)
      run: |
        # Baris ini bakal jalanin perintah yang kamu dapet dari Google
        ${{ github.event.inputs.auth_code }} --pin=123456
        
