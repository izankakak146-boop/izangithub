name: Linux-CRD-Android-Zan-Upgrade

on:
  workflow_dispatch:
    inputs:
      auth_token:
        description: 'Masukkan Auth Token dari Chrome Remote Desktop'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Membersihkan Storage (Biar Gak Sempit)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install Ubuntu Desktop & XFCE
        run: |
          sudo apt update
          # Pake --no-install-recommends biar download gak kegedean tapi tetep Ubuntu asli
          sudo apt install --no-install-recommends ubuntu-desktop xfce4 xfce4-goodies -y
          
      - name: Install Google Chrome Remote Desktop (Link Resmi)
        run: |
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo dpkg --install chrome-remote-desktop_current_amd64.deb
          sudo apt install --fix-broken -y

      - name: Jalankan CRD dengan Auth Token
        run: |
          # Perintah ini bakal ambil token yang kamu ketik di kotak input tadi
          ${{ github.event.inputs.auth_token }} --pin=123456
          
      - name: Menjaga Runner Tetap Hidup (Anti-Mati)
        run: |
          echo "Server Berhasil Jalan! Silakan cek di Chrome Remote Desktop HP kamu."
          # Loop supaya workflow gak langsung selesai/mati
          sleep 21600
          
