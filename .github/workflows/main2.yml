name: Linux-CRD-Zan-Final-Destruction

on:
  workflow_dispatch:
    inputs:
      auth_token:
        description: 'Masukkan Auth Token (Debian Linux) dari Google CRD'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bersihkan Sampah GitHub
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install XFCE Desktop (Tanpa Typo)
        run: |
          sudo apt update
          sudo apt install xfce4 xfce4-goodies -y

      - name: Install CRD Anti-404
        run: |
          curl -fSsL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg >> /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome-remote-desktop/deb/ stable main" | sudo tee /etc/apt/sources.list.d/chrome-remote-desktop.list
          sudo apt update
          sudo apt install chrome-remote-desktop -y

      - name: Fix Config & Jalankan CRD
        run: |
          mkdir -p ~/.config/chrome-remote-desktop
          sudo chown -R $USER:$USER ~/.config
          # Set XFCE Desktop Session
          echo "exec startxfce4" > ~/.chrome-remote-desktop-session
          # Masukkan Auth Token
          ${{ github.event.inputs.auth_token }} --pin=123456
          
      - name: Jaga Server Anti-Mati (6 Jam)
        run: |
          echo "SERVER AKTIF! Cek CRD di Android kamu sekarang."
          # Loop biar gak mati
          sleep 21600
          
