name: UBUNTU_VNC_HARDCORE_FIX
on: 
  workflow_dispatch:

jobs:
  run_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - name: 🛠️ Install Tools & Tailscale
      run: |
        sudo apt-get update
        sudo apt-get install qemu-system-x86 qemu-utils psmisc aria2 -y
        curl -fsSL https://tailscale.com/install.sh | sh

    - name: 🔑 Connect Tailscale (Hardcoded)
      run: |
        # GANTI tskey-auth-xxx DENGAN KEY KAMU SENDIRI!
        sudo tailscale up --authkey=tskey-auth-k6L27xUHRD11CNTRL-RvkmNiNRnS86iUNZXukET83PGCKLEEgG

    - name: 🚀 Turbo Download ISO (Link Official Baru)
      run: |
        # Pakai link releases resmi (Bukan old-releases) biar gak 404
        aria2c -x 16 -s 16 -k 1M -o ubuntu.iso "https://releases.ubuntu.com/20.04/ubuntu-20.04.6-desktop-amd64.iso"
        qemu-img create -f qcow2 ubuntu_disk.qcow2 30G

    - name: 💻 Eksekusi QEMU (AMD EPYC + VNC Mode)
      run: |
        sudo pkill qemu-system-x86_64 || true
        
        # Spek Gahar Request-an kamu
        sudo qemu-system-x86_64 \
          -m 4G \
          -smp 2 \
          -cpu host \
          -enable-kvm \
          -drive file=ubuntu_disk.qcow2,format=qcow2 \
          -cdrom ubuntu.iso \
          -vga std \
          -display vnc=:0 \
          -net nic,model=virtio -net user \
          -device usb-ehci,id=usb -device usb-tablet,bus=usb.0 &
          
        echo "✅ Ubuntu SIAP!"
        echo "🌐 IP Tailscale kamu:"
        tailscale ip -4

    - name: 🛡️ Jaga Runner (6 Jam)
      run: |
        echo "🔥 CONNECT VIA VNC VIEWER KE IP TAILSCALE DI ATAS!"
        for i in {1..360}; do
          echo "⏰ Menit ke-$i: Runner tetap hidup..."
          sleep 60
        done
        
