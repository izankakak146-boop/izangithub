name: Windows10-LTSC-Direct-Sultan

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-knoQj9P1De11CNTRL-AqDZd4qiSZ4TNVmo2VcbZ4P83USh5phk

      - name: 🛠️ Install QEMU & Extractor
        run: |
          sudo apt update
          sudo apt install qemu-system-x86 aria2 unrar p7zip-full -y

      - name: 📥 Download & Extract Windows (Direct Link Mode)
        run: |
          # Menggunakan link direct MediaFire yang kamu kasih
          aria2c -x 16 -s 16 -k 1M -o windows_data.rar "https://download1582.mediafire.com/glxio6ad87ygwqXet2UEWj-xTe9p_q3BIHL2YnbCv7qo9L-xQLgPs6fXvK9zoGqN_5clefzl36NUB8irc-k0IT4f6mSlOnp4XSVnFxIPfKZNkUMsRqUlcXh5J-PYb3RxMlo43pCh3uIDxZTu22-701pDG84Rl_UpgWdIM1NUET3CkZYZ/1s7os2gn6kx5bu7/Windows+10+Enterprise+LTSC.rar"
          
          echo "📦 Mengekstrak file RAR... Sabar Zan, jangan emosi..."
          unrar x -p- windows_data.rar || 7z x windows_data.rar
          
          echo "📂 Cek isi file hasil ekstrak:"
          ls -R

      - name: 💻 Gaskeun Windows (Fake GPU + RTC Fix)
        run: |
          # Cari file disk (vhd, qcow2, img, raw, iso) otomatis
          DISK_FILE=$(ls *.vhd *.qcow2 *.img *.raw *.iso | head -n 1)
          echo "💿 Booting dari file: $DISK_FILE"

          sudo qemu-system-x86_64 \
            -m 8G \
            -cpu qemu64,+ssse3,+sse4.1,+sse4.2,+x2apic \
            -smp 4,cores=4 \
            -vga virtio \
            -display vnc=:0 \
            -drive file="$DISK_FILE",format=raw \
            -device usb-ehci,id=usb -device usb-tablet,bus=usb.0 \
            -net nic,model=virtio -net user \
            -rtc base=localtime &
          
          echo "🔥 SERVER SUDAH AKTIF!"
          echo "🌐 Cek IP di Tailscale HP kamu."
          echo "⏳ Menjaga koneksi selama 6 jam..."
          sleep 21600
          
