name: Windows10-LTSC-Full-Fix

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-knoQj9P1De11CNTRL-AqDZd4qiSZ4TNVmo2VcbZ4P83USh5phk

      - name: 🛠️ Install QEMU & Extractor
        run: |
          sudo apt update
          sudo apt install qemu-system-x86 aria2 unrar p7zip-full -y

      - name: 📥 Download & Extract Windows (Anti-MediaFire Error)
        run: |
          # Menggunakan link MediaFire kamu dengan opsi -L (Follow Redirect)
          # Dan menambahkan User-Agent biar MediaFire nggak curiga itu Bot
          aria2c -x 16 -s 16 -k 1M --user-agent="Mozilla/5.0" -o windows_data.rar "https://www.mediafire.com/file/1s7os2gn6kx5bu7/Windows_10_Enterprise_LTSC.rar/file" || \
          curl -L -A "Mozilla/5.0" -o windows_data.rar "https://www.mediafire.com/file/1s7os2gn6kx5bu7/Windows_10_Enterprise_LTSC.rar/file"
          
          echo "📦 Mengekstrak file... Sabar ya Zan..."
          # Mencoba unrar, kalau gagal pakai 7zip
          unrar x -p- windows_data.rar || 7z x windows_data.rar
          
          echo "📂 Daftar file hasil ekstrak:"
          ls -R

      - name: 💻 Gaskeun Windows (Fake GPU Mode)
        run: |
          # Cari file disk hasil ekstrak otomatis (iso, vhd, img, qcow2, raw)
          DISK_FILE=$(ls *.vhd *.qcow2 *.img *.raw *.iso | head -n 1)
          echo "💿 Booting dari file: $DISK_FILE"

          sudo qemu-system-x86_64 \
            -m 8G \
            -cpu qemu64,+ssse3,+sse4.1,+sse4.2,+x2apic \
            -smp 4,cores=4 \
            -vga virtio \
            -display vnc=:0 \
            -drive file="$DISK_FILE",format=raw \
            -device usb-ehci,id=usb -device usb-tablet,bus=usb.0 \
            -net nic,model=virtio -net user \
            -rtc base=localtime &
          
          echo "🔥 SERVER SUDAH AKTIF!"
          echo "🌐 Cek IP di aplikasi Tailscale HP kamu."
          echo "⏳ Menjaga koneksi selama 6 jam..."
          sleep 21600
          
