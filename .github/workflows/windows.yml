name: Windows7_Izan_Final_Beneran
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Amunisi Mekanik (QEMU & Cloudflare)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 novnc websockify qemu-utils
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Download ISO Windows 7 Lite (Link Anti-Gagal)
        run: |
          # Pakai link cadangan yang lebih tahan banting
          wget -O win7.iso "https://bit.ly/win7lite-izan" || \
          wget -O win7.iso "http://iso.cdn.vov.me/Windows%207%20Lite%20x86.iso"

      - name: 3. Goreng Windows 7 (RAM 8GB + Tetap HOST)
        run: |
          qemu-img create -f qcow2 windows.qcow2 20G
          
          # Tetap pakai -cpu host biar tenaga AMD EPYC-nya keluar maksimal
          sudo qemu-system-x86_64 \
            -m 8G \
            -smp 2 \
            -cpu host \
            -enable-kvm \
            -drive file=windows.qcow2,format=qcow2 \
            -cdrom win7.iso \
            -device usb-ehci,id=usbbus \
            -device usb-tablet,bus=usbbus.0 \
            -vnc 0.0.0.0:0 \
            -vga std \
            -boot d \
            -display none &

          sleep 25
          websockify --web /usr/share/novnc/ 6080 0.0.0.0:5900 &
          
          echo "✅ Windows lagi digoreng... Bismillah kali ini gak 404!"
          sleep 60

      - name: 4. Sajikan Link Windows 7 VVIP
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, CEK LINK BARU INI!"
          echo "-------------------------------------------------------"
          cloudflared tunnel --url http://127.0.0.1:6080
          
