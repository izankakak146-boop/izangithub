name: Windows7_Izan_Final_Beneran
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siapkan Mesin (QEMU & Cloudflare)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 novnc websockify qemu-utils
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Download ISO Windows 7 Lite (Link Stabil)
        run: |
          # Pakai link yang lebih kencang ditarik server
          wget -O win7.iso "https://bit.ly/win7lite-izan-direct" || \
          curl -L -o win7.iso "https://github.com/SlametVVIP/ISO/raw/main/Win7_Lite.iso"
          
          # Proteksi biar gak "No Bootable Device" lagi
          if [ ! -s win7.iso ]; then
            echo "❌ ISO GAGAL DOWNLOAD, MEKANIK MENYERAH!"
            exit 1
          fi

      - name: 3. Goreng Windows 7 (RAM 8GB + AMD EPYC)
        run: |
          # Buat harddisk virtual 20GB
          qemu-img create -f qcow2 windows.qcow2 20G
          
          # Pakai -cpu host biar lari kenceng kayak motor balap
          sudo qemu-system-x86_64 \
            -m 8G \
            -smp 2 \
            -cpu host \
            -enable-kvm \
            -drive file=windows.qcow2,format=qcow2 \
            -cdrom win7.iso \
            -device usb-ehci,id=usbbus \
            -device usb-tablet,bus=usbbus.0 \
            -vnc 0.0.0.0:0 \
            -vga std \
            -boot d \
            -display none &

          sleep 20
          websockify --web /usr/share/novnc/ 6080 0.0.0.0:5900 &
          
          echo "✅ Windows lagi dipanasin... Bismillah dapet logo Windows!"
          sleep 60

      - name: 4. Sajikan Link Windows 7 VVIP
        run: |
          echo "-------------------------------------------------------"
          echo "🚀 IZAN, COBA CEK LINK DI BAWAH INI!"
          echo "Kalau muncul noVNC, tunggu bentar sampai logo muncul."
          echo "-------------------------------------------------------"
          cloudflared tunnel --url http://127.0.0.1:6080
          
