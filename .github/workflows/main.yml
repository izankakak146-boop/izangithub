name: Android VNC Simulation
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install All Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm fluxbox x11vnc xvfb novnc jq python3-pip adb xterm scrcpy
          pip3 install websockify

      - name: Setup Android Container
        run: |
          # Menarik image redroid (proses 'pulling' di log kamu)
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:9.0.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=15 \
            androidboot.use_mesa=1

      - name: Visual & Super Auto-Launch
        run: |
          # Menjalankan display virtual
          Xvfb :1 -screen 0 480x854x16 &
          sleep 5
          DISPLAY=:1 fluxbox &
          
          # Terminal 1: Otomatis menghubungkan ADB
          DISPLAY=:1 xterm -geometry 60x10+10+10 -e "
          echo 'TAHAP 1: MENGHUBUNGKAN ADB...';
          until adb connect localhost:5555 | grep -q 'connected'; do
            echo 'Menunggu koneksi...';
            sleep 2;
          done;
          echo 'ADB BERHASIL TERHUBUNG!';
          adb -s localhost:5555 wait-for-device;
          bash" &

          # Terminal 2: Memaksa layar muncul (VERSI PERBAIKAN)
          DISPLAY=:1 xterm -geometry 60x10+10+250 -e "
          echo 'TAHAP 2: MEMAKSA LAYAR MUNCUL...';
          sleep 15;
          # Menghapus opsi yang bikin error di log sebelumnya
          until DISPLAY=:1 scrcpy -s localhost:5555 --max-fps 15 --window-title 'Android-AdvanX1'; do
            echo 'Gagal memuat layar, mencoba lagi dalam 3 detik...';
            sleep 3;
          done;
          bash" &
          
          # Menjalankan VNC Server dan NoVNC
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900 &
          python3 -m websockify --web /usr/share/novnc/ 6080 localhost:5900 &

      - name: Setup Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y
          # Menggunakan Token kamu yang sudah aktif
          ngrok config add-authtoken 3BZhrzDBuVx4pbuzHO2DYa2J0Id_9nDuXkN5mLdKDFsvUZRz
          ngrok http 6080 --log=stdout &
          sleep 20
          echo "===================================================="
          echo "LINK BARU (TUNGGU 20 DETIK SETELAH BUKA):"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "===================================================="

      - name: Keep Alive
        run: sleep 21600
        
