name: RDP-TOTAL-BYPASS
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Buka-Semua-Pintu
      shell: pwsh
      run: |
        # 1. MATIKAN SEMUA PASSWORD & VALIDASI (BIAR GAK NANYA LAGI)
        reg add "HKLM\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v UserAuthentication /t REG_DWORD /d 0 /f
        reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        reg add "HKLM\System\CurrentControlSet\Control\Lsa" /v DisableRestrictedAdmin /t REG_DWORD /d 1 /f
        
        # 2. HAPUS PASSWORD USER
        net user runneradmin ""
        
        # 3. AKTIFKAN FIREWALL
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # 4. PASANG TAILSCALE
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # LOGIN TAILSCALE (MASUKKAN KEY KAMU DI SINI)
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-kbwiaUVC1G11CNTRL-JqtZhkcaqqNdqr1qRpGzqNfFFyh9J6MN --accept-routes
        
        Write-Host "Pintu sudah dicopot engselnya! Langsung gas masuk Bos!"
        $i = 0; while($i -lt 60) { Start-Sleep -Seconds 60; $i++ }
        
