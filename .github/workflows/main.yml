name: RDP-TMATE-BEBAS-AKUN
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Nyalakan-Akses
      shell: pwsh
      run: |
        # Ambil program tmate
        curl.exe -fL https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz -o tmate.tar.xz
        # Eh ini Windows, kita pake versi chocolatey aja biar gak ribet download manual
        choco install tmate -y
        
        Write-Host "=============================="
        Write-Host "TUNGGU BENTAR, LAGI NYARI JALUR..."
        Write-Host "=============================="
        
        # Jalankan tmate
        tmate -F
        
