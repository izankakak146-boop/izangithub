name: Windows-CRD-6Hours-Final-Real
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Setup Audio & CRD (Jalur Cepat)
        run: |
          # 1. Download CRD Manual
          Invoke-WebRequest "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Start-Process msiexec.exe -ArgumentList "/i crd.msi /qn /norestart" -Wait
          
          # 2. Pakai Driver Audio alternatif yang lebih stabil linknya
          choco install screencast-receiver -y --no-progress
          net start audiosrv 2>$null
          
      - name: Jalankan Google Remote Desktop
        shell: powershell
        run: |
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepDlYeCmy-8ysmte5BwheqFzFTpSxUwnvSVGBwJQhONRXRS2rP6yHMIS6LY09OX6FA" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Tahan Server 6 Jam
        run: |
          $stop = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $stop) {
            Write-Host "Server Aktif... Sisa waktu: $([math]::Round(($stop - (Get-Date)).TotalMinutes)) menit"
            Start-Sleep -Seconds 60
          }
          
