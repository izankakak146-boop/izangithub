name: ANYDESK-TAILSCALE-IZAN-FIX
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-AnyDesk-dan-Tailscale
      shell: pwsh
      run: |
        # 1. Download AnyDesk
        iwr https://download.anydesk.com/AnyDesk.exe -OutFile AnyDesk.exe
        
        # 2. JURUS SAKTI: Instal AnyDesk secara resmi (Biar Gak ERROR Service)
        Start-Process ./AnyDesk.exe -ArgumentList "--install `"C:\Program Files (x86)\AnyDesk`" --start-with-win --silent" -Wait
        
        # 3. Kasih napas 15 detik biar AnyDesk bangun
        Start-Sleep -Seconds 15
        
        # 4. Set Password 'izan123' (Gampang diingat!)
        echo "izan123" | & "C:\Program Files (x86)\AnyDesk\AnyDesk.exe" --set-password
        
        # 5. Ambil ID AnyDesk & Cetak ke Log
        $anyid = & "C:\Program Files (x86)\AnyDesk\AnyDesk.exe" --get-id
        Write-Host "==========================="
        Write-Host "ID ANYDESK KAMU: $anyid"
        Write-Host "PASSWORD: izan123"
        Write-Host "==========================="
        
        # 6. Pasang Tailscale (Jalur Favorit Kamu)
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # 7. Login Tailscale (GANTI 'TS_AUTH_KEY' PAKAI PUNYA KAMU!)
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey TS_AUTH_KEY --accept-routes
        
        Write-Host "Koneksi Berhasil! Mesin akan Online selama 60 Menit."

        # 8. JURUS PENAHAN MELEK (Biar Gak Offline Sendiri)
        $timeout = 60
        for ($i = 1; $i -le $timeout; $i++) {
          Write-Host "Menjaga koneksi... Menit ke-$i"
          Start-Sleep -Seconds 60
        }
        
