name: Windows-CRD-Audio-Search-Method
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install CRD & Audio
        run: |
          # 1. Install Driver Suara & CRD via Choco
          choco install vb-audio-cable googlechromeremotedesktop -y
          
          # 2. Paksa aktifkan servis suara
          net start audiosrv
          
      - name: Menjalankan Google Headless (Auto-Search Path)
        run: |
          # 3. Cari di mana file remoting_start_host.exe berada secara otomatis
          $crdPath = (Get-ChildItem -Path "C:\Program Files*" -Filter "remoting_start_host.exe" -Recurse -ErrorAction SilentlyContinue).FullName
          
          if ($crdPath) {
              Write-Host "Ditemukan di: $crdPath"
              # Jalankan kode dari Google menggunakan path yang sudah ditemukan
              & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0Aci98E_LamKXjcA61SilqLcjiZ93S--8BUFn_DN6y-oi01mVwM4YBEWjUgS8n925tIrpcQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME
          } else {
              Write-Error "Aplikasi tidak ditemukan, mencoba cara paksa..."
              # [MASUKKAN KODE DARI GOOGLE HEADLESS DI SINI]
          }

      - name: Jaga RDP Tetap Aktif
        run: |
          $n = 1000
          while($n -gt 0) {
            Write-Host "RDP Aktif - Cek di browser kamu sekarang!"
            Start-Sleep -Seconds 60
            $n--
          }
          
