name: RDP-LOCALTONET-FIX-V3
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup-User
      run: |
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
    - name: Setup-Localtonet
      shell: pwsh
      run: |
        # Download versi terbaru langsung dari server mereka
        Invoke-WebRequest -Uri "https://localtonet.com/download/localtonet-windows-x64.zip" -OutFile "localtonet.zip"
        Expand-Archive -Path "localtonet.zip" -DestinationPath "C:\localtonet"
        cd C:\localtonet
        
        # MASUKKAN TOKEN LOCALTONET KAMU DI SINI
        ./localtonet.exe authtokentSUr5yD0dTXHLKhfuMFP24b7cqCBsai8N
        
        # Jalankan tunnel TCP untuk RDP
        Start-Process ./localtonet.exe -ArgumentList "tcp","--port","3389"
        
        Write-Host "=============================="
        Write-Host "MESIN LOCALTONET SUDAH GAS!"
        Write-Host "CEK WEB LOCALTONET SEKARANG!"
        Write-Host "=============================="
        
        while($true){ Start-Sleep 60 }
        
