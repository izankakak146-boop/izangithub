name: RDP-TAILSCALE-IZAN-PASTI-CONNECT
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Konfigurasi-RDP-Jalur-Kilat
      shell: pwsh
      run: |
        # 1. Aktifkan RDP di sistem Windows
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        
        # 2. Set Password buat user 'runneradmin' jadi 'izan123'
        net user runneradmin izan123
        
        # 3. Pasang Tailscale (Jalur Privat Kamu)
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # LOGIN TAILSCALE (MASUKKAN KEY KAMU DI SINI)
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-kX53Zwu4nZ11CNTRL-hJTzyTLPFGX8KzGxeo3oFXzcvFFj876k --accept-routes
        
        Write-Host "RDP SIAP! Login pake IP Tailscale & Pass: izan123"
        
        # 4. Penahan Melek biar gak mati
        $i = 0; while($i -lt 60) { Start-Sleep -Seconds 60; $i++ }
        
