name: RDP-SERVEO-FINAL-BOSS
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Serveo
      shell: pwsh
      run: |
        Write-Host "=============================="
        Write-Host "MEMBUKA JALUR SERVEO (ANTI MUTER)"
        Write-Host "=============================="
        
        # Mengaktifkan RDP di sistem
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        Write-Host "Menghubungkan ke terowongan..."
        # Ini perintah saktinya, langsung tembus tanpa instal apa-apa
        ssh -o StrictHostKeyChecking=no -R 80:localhost:3389 serveo.net
        
