name: RDP-PLAYIT-V2
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Playit
      shell: pwsh
      run: |
        Write-Host "Sedang mengambil file asli Playit..."
        # Download versi Portable langsung dari server rilis
        Invoke-WebRequest -Uri "https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-windows-amd64.exe" -OutFile "playit.exe"
        
        Write-Host "=============================="
        Write-Host "TUNGGU LINK AKTIVASI MUNCUL..."
        Write-Host "=============================="
        
        # Jalankan tanpa install
        ./playit.exe
        
