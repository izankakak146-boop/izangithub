name: RDP-CLOUDFLARE-FINAL-STABIL
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Tanpa-Download
      shell: pwsh
      run: |
        Write-Host "Mengambil jalur VIP Cloudflare..."
        # Mengaktifkan RDP di Windows
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Langsung jalankan tanpa simpan file .exe
        iwr -useb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile cloudflared.exe
        ./cloudflared.exe tunnel --url tcp://localhost:3389
        
