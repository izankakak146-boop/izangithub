name: RDP-ZEROTIER-BUKAN-TUNNEL
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-ZeroTier-Sakti
      shell: pwsh
      run: |
        Write-Host "Menginstal ZeroTier..."
        $url = "https://download.zerotier.com/dist/ZeroTier%20One.msi"
        bitsadmin /transfer ZTDownload /download /priority FOREGROUND $url "$PWD\zt.msi"
        Start-Process msiexec.exe -ArgumentList "/i zt.msi /quiet /norestart" -Wait
        
        Write-Host "Menghubungkan ke Network..."
        # GANTI ID_NETWORK_KAMU dengan 16 digit ID dari web ZeroTier
        $networkId = "ID_NETWORK_KAMU"
        & "C:\Program Files (x86)\ZeroTier\One\zerotier-one_x64.exe" -q join $networkId
        
        Write-Host "=============================="
        Write-Host "CEK PANEL ZEROTIER DAN CENTANG 'AUTH'!"
        Write-Host "=============================="
        Start-Sleep -Seconds 21600
        
