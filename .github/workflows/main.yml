name: RDP-Sakti-Input-Token
on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Tempel Token Ngrok Kamu di Sini'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol
      shell: pwsh
      run: |
        # 1. Buat User RDP
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        
        # 2. Install Ngrok
        choco install ngrok -y
        
        # 3. Pakai Token dari Input
        $TOKEN = "${{ github.event.inputs.ngrok_token }}".Trim()
        ngrok config add-authtoken $TOKEN
        
        # 4. Jalankan Tunnel
        Start-Process ngrok -ArgumentList "tcp 3389"
        Write-Host "Sabar Bos, lagi nyambungin kabel..."
        Start-Sleep -Seconds 20
        
        # 5. Ambil Alamat RDP
        $api = curl.exe -s http://127.0.0.1:4040/api/tunnels
        if ($api -like "*public_url*") {
          $json = $api | ConvertFrom-Json
          $url = $json.tunnels[0].public_url
          Write-Host "-------------------------------------"
          Write-Host "ALAMAT RDP: $url"
          Write-Host "USER: runneradmin | PASS: Sakti123!"
          Write-Host "-------------------------------------"
        } else {
          Write-Host "GAGAL! Token salah atau Ngrok ngambek."
          exit 1
        }
        
        # 6. Jaga tetap hidup
        while($true){ Start-Sleep -Seconds 60 }
        
