name: CRD-ANTI-OFFLINE-IZAN
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-Chrome-Remote-Desktop
      shell: pwsh
      run: |
        # 1. Download & Install CRD Host
        $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
        bitsadmin /transfer CRDDownload /download /priority FOREGROUND $url "$PWD\crd.msi"
        Start-Process msiexec.exe -ArgumentList "/i crd.msi /quiet /norestart" -Wait
        
        # 2. TEMPAT NARUH CRP (Sesuai Pesanan Bos!)
        # HAPUS BARIS DI BAWAH INI DAN TEMPEL KODE PANJANG DARI GOOGLE:
        & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepAvgCSGq4Uh3COUs4IuyRO-45rFNcGnDQ9yhLHWjZrHHEVHd5ZxjxGf5GZpSR3OyQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME
        
        Write-Host "CRD Berhasil Dinyalakan! Menjaga mesin agar tidak offline..."
        
        # 3. JURUS PENAHAN (Biar gak offline setelah 1 menit)
        $i = 0
        while($i -lt 30) {
          Write-Host "Menjaga koneksi tetap melek... Menit ke-$i"
          Start-Sleep -Seconds 60
          $i++
        }
        
