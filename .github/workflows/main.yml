name: RDP-Sakti-Pasti-Bisa
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Tempel Token Ngrok'
        required: true
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gas
      shell: pwsh
      run: |
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        choco install ngrok -y
        $TOKEN = "${{ github.event.inputs.token }}".Trim()
        ngrok config add-authtoken $TOKEN
        Start-Process ngrok -ArgumentList "tcp --region ap 3389"
        Write-Host "Sabar Bos, nunggu 60 detik biar koneksi stabil..."
        Start-Sleep -Seconds 60
        # Coba tampilin alamat di log lagi
        $api = curl.exe -s http://127.0.0.1:4040/api/tunnels | ConvertFrom-Json
        Write-Host "ALAMAT RDP: $($api.tunnels[0].public_url)"
        while($true){ Start-Sleep 60 }
        
