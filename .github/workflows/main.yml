name: RDP-LOCALTUNNEL-IP-PASTI
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Localtunnel
      shell: pwsh
      run: |
        Write-Host "=============================="
        Write-Host "NIHHH PASSWORD TUNNEL KAMU:"
        # Pakai --silent biar gak banyak sampah log, langsung angka IP-nya aja
        $myip = curl.exe --silent https://ifconfig.me
        Write-Host $myip
        Write-Host "=============================="
        
        Write-Host "Lagi instal terowongan..."
        npm install -g localtunnel
        
        Write-Host "TUNGGU LINKNYA MUNCUL DI BAWAH"
        lt --port 3389
        
