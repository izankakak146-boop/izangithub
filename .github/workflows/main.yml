name: Windows-CRD-Audio-Fixed
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Persiapan Driver Audio & Aplikasi CRD
        run: |
          # 1. Install Chrome Remote Desktop & Driver Suara (Otomatis)
          choco install googlechromeremotedesktop vb-audio-cable -y
          
          # 2. Aktifkan servis suara Windows
          net start audiosrv
          
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepAz_-3GmBJamPlAodWklyoB1vagXLWyDxcecC-6EDnPziiJf7pYNVV1rnplf7vUmg" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Menjaga RDP Tetap Aktif
        run: |
          $n = 1000
          while($n -gt 0) {
            Write-Host "RDP Aktif dengan Audio..."
            Start-Sleep -Seconds 60
            $n--
          }
          
