name: VNC-TAILSCALE-FIX-PASSWORD
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-VNC-dan-Suntik-Password
      shell: pwsh
      run: |
        # 1. Download TightVNC
        $url = "https://www.tightvnc.com/download/2.8.63/tightvnc-2.8.63-gpl-setup-64bit.msi"
        bitsadmin /transfer VNCDownload /download /priority FOREGROUND $url "$PWD\vnc.msi"
        
        # 2. Install TightVNC diam-diam
        Start-Process msiexec.exe -ArgumentList "/i vnc.msi /quiet /norestart" -Wait
        
        # 3. KODE SAKTI: Suntik Password ke Registry & System
        # Kita set password 'Sakti123!' secara paksa agar tidak ditolak lagi
        $pass = "Sakti123!"
        & "C:\Program Files\TightVNC\tvnserver.exe" -install
        & "C:\Program Files\TightVNC\tvnserver.exe" -controlpass=$pass -vncpass=$pass
        
        # 4. Pasang Tailscale
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # 5. Login Tailscale (GANTI 'TS_AUTH_KEY' dengan Auth Key kamu!)
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-kquwAQAuNA11CNTRL-FGx1PKCEJBPNMsX87uuSBPp5pCE5DZBc --accept-routes
        
        # 6. Restart Service VNC biar passwordnya aktif
        net stop "TightVNC Server"
        net start "TightVNC Server"
        
        Write-Host "VNC AKTIF! Password: $pass"
        Write-Host "Mesin akan online selama 30 Menit ke depan..."

        # 7. KODE SAKTI: Menjaga mesin tetap Online (30 Menit)
        $timeout = 30
        for ($i = 1; $i -le $timeout; $i++) {
          Write-Host "Menjaga koneksi... Menit ke-$i"
          Start-Sleep -Seconds 60
        }
        
