name: RDP-Sakti-Final-V10
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Tempel Token Ngrok'
        required: true
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol
      shell: pwsh
      run: |
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        choco install ngrok -y
        $TOKEN = "${{ github.event.inputs.token }}".Trim()
        ngrok config add-authtoken $TOKEN
        Start-Process ngrok -ArgumentList "tcp --region ap 3389"
        Write-Host "Sabar Bos, lagi mancing alamat..."
        Start-Sleep -Seconds 30
        
        # Cara paksa ambil URL dan tampilin sebagai teks biasa
        $info = curl.exe -s http://127.0.0.1:4040/api/tunnels | ConvertFrom-Json
        $hasil = $info.tunnels[0].public_url
        
        Write-Host "===================================="
        Write-Host "ALAMAT RDP KAMU ADALAH:"
        Write-Host $hasil
        Write-Host "===================================="
        
        while($true){ 
          Write-Host "Masih idup..."
          Start-Sleep 60 
        }
        
