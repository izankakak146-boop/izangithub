name: VNC-SUPER-SAKTI-IZAN
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Konfigurasi-Sakti-Password-Izan
      shell: pwsh
      run: |
        # 1. Download & Install TightVNC
        $url = "https://www.tightvnc.com/download/2.8.63/tightvnc-2.8.63-gpl-setup-64bit.msi"
        bitsadmin /transfer VNCD /download /priority FOREGROUND $url "$PWD\vnc.msi"
        Start-Process msiexec.exe -ArgumentList "/i vnc.msi /quiet /norestart" -Wait
        
        # 2. JURUS SAKTI: Suntik Password 'izan123' & Matikan Security
        # Kita setel langsung ke jantung Windows (Registry)
        $regPath = "HKLM:\SOFTWARE\TightVNC\Server"
        if (!(Test-Path $regPath)) { New-Item -Path $regPath -Force }
        
        # Matikan enkripsi biar AVNC gak bingung
        Set-ItemProperty -Path $regPath -Name "RequiredSecurity" -Value "None" -Type DWord
        Set-ItemProperty -Path $regPath -Name "AcceptSetPassword" -Value 1 -Type DWord
        
        # Set Password lewat command line bawaan TightVNC
        & "C:\Program Files\TightVNC\tvnserver.exe" -install
        & "C:\Program Files\TightVNC\tvnserver.exe" -vncpass=izan123 -controlpass=izan123
        
        # 3. Pasang Tailscale
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # 4. Login Tailscale (PASTIKAN AUTH KEY KAMU BENAR)
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey TS_AUTH_KEY --accept-routes
        
        # 5. Restart Service buat aktifin password baru
        net stop "TightVNC Server"
        net start "TightVNC Server"
        
        Write-Host "VNC SIAP! Password baru: izan123"
        Write-Host "Gunakan IP Tailscale yang muncul di HP kamu."
        
        # 6. Tahan mesin selama 60 Menit (Biar puas!)
        $timeout = 60
        for ($i=1; $i -le $timeout; $i++) {
          Write-Host "Mesin Melek... Menit ke-$i"
          Start-Sleep -Seconds 60
        }
        
