name: Windows-CRD-6Hours-Audio
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install CRD & Audio Driver
        run: |
          # Install aplikasi & driver suara (Otomatis)
          choco install googlechromeremotedesktop vb-audio-cable -y --no-progress
          # Aktifkan servis suara agar tidak bisu
          net start audiosrv 2>$null
          
      - name: Jalankan Google Remote Desktop
        shell: powershell
        run: |
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0Aci98E-VsN2rpfADbeHaaoxgJO2cszZxfAL9vxig4y4rc2vy-IjKFV0U9RtCWHmyWrwrgA" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Menahan Server Agar Online 6 Jam
        run: |
          # Menghitung 6 jam (21600 detik) agar GitHub tidak mematikan server
          $seconds = 21600
          $start = Get-Date
          while ((Get-Date) -lt $start.AddSeconds($seconds)) {
            $remaining = [math]::Round(($start.AddSeconds($seconds) - (Get-Date)).TotalMinutes)
            Write-Host "Server Aktif. Sisa waktu: $remaining menit..."
            Start-Sleep -Seconds 60
          }
          
