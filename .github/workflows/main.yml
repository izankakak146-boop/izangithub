name: RDP-SSH-MURNI-GAS
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Nyalakan-Akses
      shell: pwsh
      run: |
        Write-Host "Membuka jalur murni lewat localhost.run..."
        # Langsung buka terowongan tanpa install apapun
        # Link akan muncul di log di bawah
        ssh -o StrictHostKeyChecking=no -R 80:localhost:3389 nokey@localhost.run
        
