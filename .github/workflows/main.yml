name: RDP-ANTI-ERROR
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Tempel Token Ngrok'
        required: true
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Nyalain Mesin
      shell: pwsh
      run: |
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        choco install ngrok -y
        ngrok config add-authtoken ${{ github.event.inputs.token }}
        # Kita nyalain ngrok, trus biarin aja sampe kiamat
        Start-Process ngrok -ArgumentList "tcp --region ap 3389"
        Write-Host "MESIN SUDAH NYALA BOS!"
        Write-Host "Sekarang cek alamatnya di web Ngrok manual."
        while($true){ Start-Sleep 60 }
        
