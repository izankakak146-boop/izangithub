name: Windows-CRD-6Hours-Final-Official
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Persiapan Driver & App
        run: |
          # Download & Install CRD Resmi Google
          $crdUrl = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          Invoke-WebRequest $crdUrl -OutFile "crd.msi"
          Start-Process msiexec.exe -ArgumentList "/i crd.msi /qn /norestart" -Wait
          
          # Aktifkan Audio bawaan Windows
          net start audiosrv
          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server\WinStations" /v ConsoleAudio /t REG_DWORD /d 1 /f

      - name: Jalankan Google Remote Desktop
        shell: powershell
        run: |
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepBIZ75W7U-akcUvzCD3_ypNtj-i78-zkH4Iw_pcSyFiwyBwUtEQPTkVJIEm0twOeg" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Menjaga RDP Tetap Aktif 6 Jam
        run: |
          $stop = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $stop) {
            Write-Host "Server Aktif... Sisa waktu: $([math]::Round(($stop - (Get-Date)).TotalMinutes)) menit"
            Start-Sleep -Seconds 60
          }
          
