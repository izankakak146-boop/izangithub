name: RDP-CLOUDFLARE-PASTI-JALAN
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol
      shell: pwsh
      run: |
        # Download Cloudflared
        Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.msi" -OutFile "cf.msi"
        Start-Process msiexec.exe -ArgumentList "/i cf.msi /quiet" -Wait
        
        # Jalankan Tunnel RDP
        Write-Host "=============================="
        Write-Host "TUNGGU ALAMATNYA MUNCUL DI BAWAH..."
        Write-Host "=============================="
        & "C:\Program Files (x86)\cloudflared\cloudflared.exe" tunnel --url tcp://localhost:3389
        
