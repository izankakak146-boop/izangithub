name: Android VNC Simulation
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm fluxbox x11vnc xvfb novnc jq

      - name: Setup Android Container
        run: |
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:11.0.0-latest \
            androidboot.redroid_width=720 \
            androidboot.redroid_height=1280 \
            androidboot.redroid_fps=30

      - name: Start Display and VNC
        run: |
          Xvfb :1 -screen 0 720x1280x24 &
          sleep 5
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900 &
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080 &

      - name: Install Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update
          sudo apt-get install ngrok -y

      - name: Configure Ngrok Token
        run:  3B3DQ6lO2q6Wj0Nf6sLXu2q1Iaz_3vsC3sLSY29SgvsF6tC6h

      - name: Start Ngrok Tunnel
        run: |
          ngrok http 6080 --log=stdout &
          sleep 15
          echo "===================================================="
          echo "SALIN LINK DI BAWAH INI DAN BUKA DI BROWSER HP:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "===================================================="

      - name: Keep Alive
        run: sleep 21600
        
