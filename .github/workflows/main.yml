name: RDP-FINAL-JALUR-SISTEM
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Buka-Gerbang-Asli
      shell: pwsh
      run: |
        Write-Host "Mengaktifkan fitur RDP bawaan..."
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        Write-Host "=============================="
        Write-Host "MENGHUBUNGKAN JALUR RAHASIA..."
        Write-Host "=============================="
        
        # Kita pakai SSH murni, tidak ada file .exe yang didownload
        # Kita pakai port 443 (jalur HTTPS) biar dikira traffic web biasa
        ssh -o StrictHostKeyChecking=no -R 80:localhost:3389 serveo.net
        
