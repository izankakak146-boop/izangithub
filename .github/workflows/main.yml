name: RDP-LOCALTONET-FINAL-GAS
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup-Localtonet
      shell: pwsh
      run: |
        # Download Localtonet
        Invoke-WebRequest -Uri "https://localtonet.com/download/localtonet-windows-x64.zip" -OutFile "lt.zip"
        Expand-Archive -Path "lt.zip" -DestinationPath "C:\lt"
        cd C:\lt
        
        # JALANKAN TOKEN LOCALTONET LANGSUNG
        # GANTI_DENGAN_TOKEN_LOCALTONET_ASLI_KAMU
        ./localtonet.exe authtokentSUr5yD0dTXHLKhfuMFP24b7cqCBsai8N
        
        # Aktifkan Tunnel TCP Port 3389
        Start-Process ./localtonet.exe -ArgumentList "tcp","--port","3389"
        
        Write-Host "=============================="
        Write-Host "MESIN AKTIF! CEK WEB LOCALTONET"
        Write-Host "=============================="
        while($true){ Start-Sleep 60 }
        
