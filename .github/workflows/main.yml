name: RDP-SERVEO-FINAL
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Serveo
      shell: pwsh
      run: |
        Write-Host "Lagi buka jalur murni..."
        # Langsung tembak tunnel tanpa install apa-apa
        Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -R 80:localhost:3389 serveo.net" -RedirectStandardOutput "link.txt"
        
        Write-Host "=============================="
        Write-Host "TUNGGU 20 DETIK..."
        Write-Host "=============================="
        
        Start-Sleep -Seconds 20
        Get-Content link.txt
        
        while($true){ Start-Sleep 60 }
        
