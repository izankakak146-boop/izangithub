name: RDP-FINAL-BOSS-PASTI-JADI
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Final
      shell: pwsh
      run: |
        Write-Host "Lagi instal terowongan sakti..."
        # Instal localtunnel lewat npm (pasti berhasil karena ini jalur resmi)
        npm install -g localtunnel
        
        Write-Host "=============================="
        Write-Host "PASSWORD TUNNEL KAMU (CATAT!):"
        # Mengambil IP Public buat password bypass localtunnel
        curl.exe ifconfig.me
        Write-Host "`n=============================="
        
        Write-Host "Membuka jalur RDP..."
        # Langsung tembak port RDP (3389)
        lt --port 3389
        
