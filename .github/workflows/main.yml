name: RDP-Sakti-Pasti-Jadi
on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Tempel Token Ngrok Kamu'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol
      shell: pwsh
      run: |
        # 1. User RDP
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        
        # 2. Install Ngrok (Cepat)
        choco install ngrok -y
        
        # 3. Bersihkan Token dari Spasi Nakal
        $TOKEN = "${{ github.event.inputs.ngrok_token }}".Trim()
        
        # 4. Jalankan Tanpa Tunggu Konfirmasi
        & ngrok authtoken $TOKEN
        Start-Process ngrok -ArgumentList "tcp 3389"
        
        Write-Host "Lagi mancing alamat IP... Tunggu bentar..."
        Start-Sleep -Seconds 20
        
        # 5. Ambil IP dengan cara yang lebih kuat
        $api = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
        if ($api.tunnels.public_url) {
          $url = $api.tunnels[0].public_url
          Write-Host "`n===================================="
          Write-Host "BERHASIL JALAN, BOS!"
          Write-Host "ALAMAT RDP: $url"
          Write-Host "USER: runneradmin | PASS: Sakti123!"
          Write-Host "===================================="
        } else {
          Write-Host "Ngrok belum dapet IP. Coba cek dashbord ngrok kamu, Bos."
          exit 1
        }
        
        while($true){ Start-Sleep -Seconds 60 }
        
