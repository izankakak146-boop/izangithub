name: Android Fixed VNC
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fluxbox x11vnc xvfb novnc jq adb xterm scrcpy python3-pip
          pip3 install websockify

      - name: Setup Android (Ultra Light)
        run: |
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:8.1.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=15

      - name: Launch Display & Services
        run: |
          # 1. Start Virtual Display
          Xvfb :1 -screen 0 480x854x16 &
          sleep 3
          DISPLAY=:1 fluxbox &
          
          # 2. Start VNC Server (Ini mesin utamanya)
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900 &
          sleep 3
          
          # 3. Start NoVNC (Penyambung ke Browser)
          # Kita pakai websockify manual supaya lebih kuat jalurnya
          websockify --web /usr/share/novnc/ 6080 localhost:5900 &
          
          # 4. Terminal Paksa Koneksi
          DISPLAY=:1 xterm -geometry 60x10+10+10 -e "
          echo 'MENYAMBUNG ADB...';
          until adb connect localhost:5555; do sleep 1; done;
          adb wait-for-device;
          echo 'SUDAH ONLINE!';
          DISPLAY=:1 scrcpy -s localhost:5555 --max-fps 15 --bit-rate 2M --always-on-top;
          bash" &

      - name: Setup Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y
          ngrok config add-authtoken 3BZhrzDBuVx4pbuzHO2DYa2J0Id_9nDuXkN5mLdKDFsvUZRz
          # Paksa Ngrok jalan di port 6080
          ngrok http 6080 --log=stdout &
          sleep 15
          echo "===================================================="
          echo "LINK BARU:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "===================================================="

      - name: Keep Alive
        run: sleep 21600
        
