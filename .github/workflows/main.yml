name: RDP-LOCALTUNNEL-BEBAS
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Localtunnel
      shell: pwsh
      run: |
        Write-Host "Lagi instal terowongan..."
        # Instal localtunnel lewat npm (pasti ada di github)
        npm install -g localtunnel
        
        Write-Host "=============================="
        Write-Host "TUNGGU LINKNYA MUNCUL DI BAWAH"
        Write-Host "=============================="
        
        # Buka jalur RDP (3389)
        lt --port 3389
        
