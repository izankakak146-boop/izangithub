name: RDP-Sakti-Final
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Tempel Token Ngrok Kamu'
        required: true
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol
      shell: pwsh
      run: |
        # Buat User
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        # Install Ngrok
        choco install ngrok -y
        # Pasang Token
        $TOKEN = "${{ github.event.inputs.token }}".Trim()
        ngrok config add-authtoken $TOKEN
        # Jalankan
        Start-Process ngrok -ArgumentList "tcp --region ap 3389"
        Write-Host "Nunggu tunnel nyambung..."
        Start-Sleep -Seconds 20
        # Ambil IP
        $api = curl.exe -s http://127.0.0.1:4040/api/tunnels
        Write-Host "--- ALAMAT RDP ADA DI BAWAH ---"
        echo $api
        while($true){ Start-Sleep 60 }
        
