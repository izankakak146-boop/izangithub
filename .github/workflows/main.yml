name: RDP-LOCALTONET-PASTI-BISA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup-Localtonet
      shell: pwsh
      run: |
        net user runneradmin Sakti123! /add
        net localgroup administrators runneradmin /add
        # Download Localtonet
        Invoke-WebRequest -Uri "https://localtonet.com/download/localtonet-windows-x64.zip" -OutFile "lt.zip"
        Expand-Archive -Path "lt.zip" -DestinationPath "C:\lt"
        cd C:\lt
        # Jalankan dengan Token kamu
        # GANTI_TOKEN_DI_BAWAH
        ./localtonet.exe -t tSUr5yD0dTXHLKhfuMFP24b7cqCBsai8N &
        Start-Sleep -Seconds 20
        Write-Host "=============================="
        Write-Host "CEK DASHBOARD LOCALTONET DI WEB"
        Write-Host "BAGIAN 'MY TUNNELS' -> TCP"
        Write-Host "=============================="
        while($true){ Start-Sleep 60 }
        
