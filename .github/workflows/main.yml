name: CRD-24JAM-ANTI-KICK
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-CRD-dan-Anti-Sleep
      shell: pwsh
      run: |
        # 1. Download & Instal Chrome Remote Desktop
        iwr https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crd.msi
        Start-Process msiexec.exe -ArgumentList "/i crd.msi /quiet /norestart" -Wait
        
        # 2. MASUKKAN KODE DARI GOOGLE DI BAWAH INI:
        # Ganti seluruh baris di bawah dengan kode yang kamu copy dari Google
        & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepBblmVIb_Vrz72EEqDDu7CO2SNSgGWOQDThhQb5mXeln-Hq-7D5L9v1H3WOzlu01Q" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME --pin=123456
        
        # 3. Setting Power agar tidak Sleep (Anti-Offline)
        powercfg /x -hibernate-timeout-ac 0
        powercfg /x -sleep-timeout-ac 0
        
        # 4. Jurus Anti-Kick 24 Jam (Looping tak terbatas)
        Write-Host "Server ONLINE! Cek di aplikasi Chrome Remote Desktop HP kamu."
        $i = 0
        while($true) {
          $i++
          Write-Host "Menjaga koneksi... Menit ke-$i"
          # Simulasi gerakan sistem agar tidak dianggap idle
          $shell = New-Object -ComObject WScript.Shell
          $shell.SendKeys('{SCROLLLOCK}')
          Start-Sleep -Seconds 60
        }
        
