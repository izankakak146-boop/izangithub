name: RDP-TAILSCALE-REBORN
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-Tailscale
      shell: pwsh
      run: |
        Write-Host "Sedang menjinakkan Tailscale..."
        # Download & Install versi terbaru
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe
        Start-Process .\tailscale.exe -ArgumentList "/quiet /norestart" -Wait
        
        Write-Host "=============================="
        Write-Host "MENYAMBUNGKAN KE JARINGAN..."
        Write-Host "=============================="
        
        # Jalankan dengan Auth Key kamu
        # Masukkan Key kamu di bawah ini (yang depannya 'tskey-auth-xxxx')
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=tskey-auth-kVPwv3ufK511CNTRL-JJXAcrJHr9QMaHHMo8Xh9QJXdaKc1simN
        
        # Cek status buat buktiin dia nggak bohong
        & "C:\Program Files\Tailscale\tailscale.exe" status
        
        Write-Host "=============================="
        Write-Host "KALAU STATUS DI ATAS MUNCUL IP, CEK HP!"
        Write-Host "=============================="
        
        # Biarkan tetap jalan 6 jam
        Start-Sleep -Seconds 21600
        
