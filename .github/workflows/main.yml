name: VNC-TAILSCALE-PASTI-JALAN
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-VNC-dan-Tailscale
      shell: pwsh
      run: |
        # 1. Pasang TightVNC dulu
        $vncUrl = "https://www.tightvnc.com/download/2.8.63/tightvnc-2.8.63-gpl-setup-64bit.msi"
        bitsadmin /transfer VNCD /download /priority FOREGROUND $vncUrl "$PWD\vnc.msi"
        Start-Process msiexec.exe -ArgumentList "/i vnc.msi /quiet /norestart SET_USEPASSWORD=1 VALUE_OF_PASSWORD=Sakti123!" -Wait
        
        # 2. Pasang Tailscale (Link Resmi)
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
        Start-Process ./tailscale-setup.exe -ArgumentList "/quiet /norestart" -Wait
        
                # 3. Login Tailscale
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-kx9FyTyMXG11CNTRL-zuLvLRmKyhFRZDCUHnqWhF2qFWxA9PNCM --accept-routes
        
        Write-Host "Tailscale sedang dipaksa online... Jangan di-stop!"
        
        # JURUS BIAR GAK ABU-ABU: Nahan mesin biar tetep hidup selama 6 jam
        $i = 0
        while($i -lt 360) {
          Write-Host "Menjaga koneksi tetap aktif... Menit ke-$i"
          Start-Sleep -Seconds 60
          $i++
        }
        
