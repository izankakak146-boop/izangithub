name: Windows-CRD-Audio-Final-Fix
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Jalankan Semua Sekaligus
        shell: powershell
        run: |
          # 1. Install CRD & Audio Driver (Abaikan error jika sudah ada)
          choco install googlechromeremotedesktop vb-audio-cable -y --accept-license --no-progress
          
          # 2. Aktifkan Audio (Pakai cara yang lebih halus agar tidak error)
          Get-Service audiosrv | Set-Service -StartupType Automatic
          Start-Service audiosrv -ErrorAction SilentlyContinue
          
          # 3. Jalankan kode Google (Langsung panggil aplikasinya)
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepDx6DMIaS_7LPVSUWsEf3oKbS_uDBDclh23k15Xda8Gfp_xavaqaZZ2cd4SCz_fmA" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Jaga RDP Tetap Aktif
        run: |
          $n = 1000
          while($n -gt 0) {
            Write-Host "RDP Aktif - Cek di browser kamu!"
            Start-Sleep -Seconds 60
            $n--
          }
          
          
