name: RDP-ANYDESK-GAS
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Nyalakan-AnyDesk
      shell: pwsh
      run: |
        # 1. Download AnyDesk
        Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "AnyDesk.exe"
        
        # 2. Jalankan AnyDesk dan set password biar kamu bisa langsung masuk
        # Passwordnya: Sakti123!
        echo "Sakti123!" | .\AnyDesk.exe --set-password
        
        # 3. Ambil ID AnyDesk mesin ini
        Start-Sleep -Seconds 5
        .\AnyDesk.exe --get-id
        
        Write-Host "=============================="
        Write-Host "TUNGGU ID ANYDESK MUNCUL DI ATAS..."
        Write-Host "=============================="
        
        while($true){ Start-Sleep 60 }
        
