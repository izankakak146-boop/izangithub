name: RDP-TAILSCALE-FINAL-GAS
on:
  workflow_dispatch:
    inputs:
      tskey:
        description: 'Masukkan Auth Key Tailscale'
        required: true
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-Tailscale
      shell: pwsh
      run: |
        curl.exe -fL https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -o tailscale-setup.exe
        Start-Process .\tailscale-setup.exe -ArgumentList "/quiet" -Wait
        
        Write-Host "Menghubungkan ke jaringan Tailscale..."
        $key = "${{ github.event.inputs.tskey }}"
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$key --accept-routes
        
        Write-Host "===================================="
        Write-Host "BERHASIL! CEK APLIKASI TAILSCALE HP"
        Write-Host "===================================="
        while($true){ Start-Sleep 60 }
        
