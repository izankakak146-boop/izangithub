name: Android VNC Simulation
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install All Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm fluxbox x11vnc xvfb novnc jq python3-pip adb
          pip3 install websockify

      - name: Setup Android Container
        run: |
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:9.0.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=15 \
            androidboot.use_mesa=1

      - name: Fix Connection & Wait
        run: |
          echo "Membersihkan sisa koneksi..."
          adb kill-server
          adb start-server
          
          echo "Menghubungkan ke Android..."
          # Paksa satu jalur koneksi saja
          until adb connect localhost:5555; do
            echo "Mencoba menyambung..."
            sleep 5
          done
          
          echo "Menunggu Online..."
          # Perintah spesifik ke satu target agar tidak 'more than one device'
          adb -s localhost:5555 wait-for-device
          sleep 15
          
          echo "Membangunkan Layar..."
          adb -s localhost:5555 shell input keyevent 26
          adb -s localhost:5555 shell input keyevent 3

      - name: Start Visual Display
        run: |
          Xvfb :1 -screen 0 480x854x16 &
          sleep 5
          DISPLAY=:1 fluxbox &
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900 &
          python3 -m websockify --web /usr/share/novnc/ 6080 localhost:5900 &

      - name: Setup Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y
          ngrok config add-authtoken 3BZhrzDBuVx4pbuzHO2DYa2J0Id_9nDuXkN5mLdKDFsvUZRz
          ngrok http 6080 --log=stdout &
          sleep 20
          echo "===================================================="
          echo "LINK TERAKHIR (PASTI BISA):"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "===================================================="

      - name: Keep Alive
        run: sleep 21600
        
