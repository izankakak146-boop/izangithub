name: Windows-Sakti-Final
on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Tempel HANYA Kode Otorisasinya (yang ada di dalam --code="...")'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: 1. Install Chrome Remote Desktop
      run: |
        $URL = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
        Invoke-WebRequest $URL -OutFile "crd.msi"
        Start-Process msiexec.exe -ArgumentList "/i crd.msi /qn" -Wait

    - name: 2. Eksekusi Langsung
      shell: pwsh
      run: |
        & "${Env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="${{ github.event.inputs.auth_code }}" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME -Pin 123456

    - name: 3. Jaga Server
      run: |
        $i = 0
        while($i -lt 360) {
          Write-Host "Windows Nyala... Menit ke-$i"
          Start-Sleep -Seconds 60
          $i++
        }
        
