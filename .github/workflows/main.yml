name: VNC-NGROK-SINGAPURA
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-VNC-Server
      shell: pwsh
      run: |
        Write-Host "Menginstal TightVNC..."
        $url = "https://www.tightvnc.com/download/2.8.63/tightvnc-2.8.63-gpl-setup-64bit.msi"
        bitsadmin /transfer VNCD /download /priority FOREGROUND $url "$PWD\vnc.msi"
        Start-Process msiexec.exe -ArgumentList "/i vnc.msi /quiet /norestart SET_USEPASSWORD=1 VALUE_OF_PASSWORD=Sakti123!" -Wait
        
        Write-Host "Mengambil Ngrok..."
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/b342Pue36pu/ngrok-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive ngrok.zip
        
        Write-Host "Menghubungkan ke Singapura..."
        # GANTI 'TOKEN_KAMU' dengan token asli dari dashboard ngrok.com
        ./ngrok.exe authtoken 3B3DQ6lO2q6Wj0Nf6sLXu2q1Iaz_3vsC3sLSY29SgvsF6tC6h
        ./ngrok.exe tcp --region ap 5900
        
