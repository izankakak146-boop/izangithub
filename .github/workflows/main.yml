name: RDP-TELEBIT-PASTI-TEMBUS
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Telebit
      shell: pwsh
      run: |
        Write-Host "Mengambil kunci Telebit..."
        # Download Telebit binary langsung
        curl.exe -L https://get.telebit.io/windows/amd64/telebit.exe -o telebit.exe
        
        Write-Host "=============================="
        Write-Host "MENYALAKAN TEROWONGAN RAHASIA..."
        Write-Host "=============================="
        
        # Jalankan tunnel untuk RDP port 3389
        ./telebit.exe http 3389
        
