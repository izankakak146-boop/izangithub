name: Windows-CRD-Audio-Manual-Fix
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Download & Install (Manual Way)
        run: |
          # 1. Download Driver Audio & CRD Langsung (Tanpa Choco)
          Invoke-WebRequest "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Invoke-WebRequest "https://download.vb-audio.com/Download_Content/VBCABLE_Setup_x64.zip" -OutFile "vbcable.zip"
          
          # 2. Install CRD secara paksa
          Start-Process msiexec.exe -ArgumentList "/i crd.msi /qn /norestart" -Wait
          
          # 3. Ekstrak & Install Audio (Silent)
          Expand-Archive vbcable.zip -DestinationPath vbcable
          Start-Process "vbcable\VBCABLE_Setup_x64.exe" -ArgumentList "/i /s" -Wait
          
          # 4. Aktifkan servis suara
          net start audiosrv 2>$null

      - name: Eksekusi Kode Google
        shell: powershell
        run: |
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0Aci98E-nArqhrZFClNGBMCLVFmQhuZgK5Ki601L_bDyrklbdJSdrfLVEQ9MI527r1IJUfQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Tahan Server 6 Jam
        run: |
          $stop = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $stop) {
            Write-Host "Server Aktif... Sisa waktu: $([math]::Round(($stop - (Get-Date)).TotalMinutes)) menit"
            Start-Sleep -Seconds 60
          }
          
