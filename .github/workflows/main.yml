name: ANYDESK-TAILSCALE-IZAN
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Pasang-AnyDesk-dan-Tailscale
      shell: pwsh
      run: |
        # 1. Download & Pasang AnyDesk
        iwr https://download.anydesk.com/AnyDesk.exe -OutFile AnyDesk.exe
        
        # 2. Set Password AnyDesk jadi 'izan123'
        echo "izan123" | ./AnyDesk.exe --set-password
        
        # 3. Jalankan AnyDesk di background
        Start-Process ./AnyDesk.exe --service
        
        # 4. Ambil ID AnyDesk biar muncul di log
        ./AnyDesk.exe --get-id
        
        # 5. Pasang Tailscale (Jalur Utama Kamu)
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # 6. Login Tailscale (GANTI AUTH_KEY KAMU)
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey TS_AUTH_KEY --accept-routes
        
        Write-Host "ANYDESK SIAP! Pass: izan123"
        # Menjaga koneksi 60 menit
        $i = 0; while($i -lt 60) { Write-Host "Melek menit ke-$i"; Start-Sleep -Seconds 60; $i++ }
        
