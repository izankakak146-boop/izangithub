name: ANYDESK-TEMBUS-LANGSUNG-IZAN
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Eksekusi-Bypass-Chat
      shell: pwsh
      run: |
        # 1. Download & Instal AnyDesk
        iwr https://download.anydesk.com/AnyDesk.exe -OutFile AnyDesk.exe
        Start-Process ./AnyDesk.exe -ArgumentList "--install `"C:\Program Files (x86)\AnyDesk`" --start-with-win --silent" -Wait
        
        # 2. MASUK KE JANTUNG ANYDESK
        cd "C:\Program Files (x86)\AnyDesk"
        
        # 3. MATIKAN FITUR CHAT/IZAN (Wajib!)
        # Perintah ini maksa AnyDesk cuma nerima akses lewat password saja
        ./AnyDesk.exe --config --unattended-access-only
        
        # 4. SET PASSWORD 'izan123'
        echo "izan123" | ./AnyDesk.exe --set-password
        
        # 5. Ambil ID & Pastikan Tailscale Jalan
        Start-Sleep -Seconds 15
        $anyid = ./AnyDesk.exe --get-id
        Write-Host "==============================="
        Write-Host "ID ANYDESK: $anyid"
        Write-Host "PASS: izan123"
        Write-Host "==============================="
        
        iwr -useb https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
        Start-Process ./ts.exe -ArgumentList "/quiet /norestart" -Wait
        
        # MASUKKAN KEY TAILSCALE KAMU DI SINI
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey tskey-auth-kBdSTCmdbm11CNTRL-kY5RzvhucXLsSRcNCgdAXLXeLNvPQ46P8 --accept-routes
        
        # Tahan melek 60 menit
        $i = 0; while($i -lt 60) { Start-Sleep -Seconds 60; $i++ }
        
