name: Android VNC Simulation
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install All Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm fluxbox x11vnc xvfb novnc jq python3

      - name: Setup Android Container
        run: |
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:11.0.0-latest \
            androidboot.redroid_width=720 \
            androidboot.redroid_height=1280 \
            androidboot.redroid_fps=30

      - name: Start Virtual Display & VNC
        run: |
          Xvfb :1 -screen 0 720x1280x24 &
          sleep 5
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900 &
          sleep 5

      - name: Run noVNC Bridge (Python Method)
        run: |
          # Menjalankan websockify agar VNC bisa dibaca via Browser
          /usr/share/novnc/utils/websockify/websockify.py --web /usr/share/novnc/ 6080 localhost:5900 &
          sleep 10

      - name: Setup Ngrok & Tunnel
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y
          
          # Token Reset Kamu:
          ngrok config add-authtoken 3BZhrzDBuVx4pbuzHO2DYa2J0Id_9nDuXkN5mLdKDFsvUZRz
          
          # Menjalankan Tunnel langsung ke port 6080
          ngrok http 6080 --log=stdout &
          sleep 20
          
          echo "===================================================="
          echo "SALIN LINK DI BAWAH INI (TUNGGU 30 DETIK):"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "===================================================="

      - name: Keep Alive
        run: sleep 21600
        
