name: RDP-PLAYIT-BUKAN-MINECRAFT
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Gaspol-Playit-RDP
      shell: pwsh
      run: |
        Write-Host "Mengambil mesin Playit..."
        # Download versi Windows resmi
        Invoke-WebRequest -Uri "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe" -OutFile "playit.exe"
        
        Write-Host "=============================="
        Write-Host "KLIK LINK CLAIM YANG MUNCUL!"
        Write-Host "=============================="
        
        # Jalankan mesinnya
        ./playit.exe
        
