name: Windows-Sakti-CRD
on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Tempel Kode PowerShell dari Google (Headless) di sini'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: 1. Install Chrome Remote Desktop
      run: |
        $URL = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
        Invoke-WebRequest $URL -OutFile "crd.msi"
        Start-Process msiexec.exe -ArgumentList "/i crd.msi /qn" -Wait

    - name: 2. Setting Power Agar Anti-Sleep
      run: |
        powercfg /x -hibernate-timeout-ac 0
        powercfg /x -hibernate-timeout-dc 0
        powercfg /x -monitor-timeout-ac 0
        powercfg /x -monitor-timeout-dc 0

    - name: 3. Eksekusi Suntik Kode
      shell: pwsh
      run: |
        ${{ github.event.inputs.auth_code }} -Pin 123456

    - name: 4. Menjaga Server Hidup 6 Jam
      run: |
        $i = 0
        while($i -lt 360) {
          Write-Host "Windows Aktif... Menit ke-$i"
          Start-Sleep -Seconds 60
          $i++
        }
        
