name: Windows-Ghost-Ninja-v2
on: 
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'Masukkan perintah Windows (PowerShell) dari CRD'
        required: true
        default: ''

jobs:
  run-ghost:
    runs-on: windows-2025 # Pake Windows Server 2025 yang paling baru!
    steps:
    - name: 1. Instalasi CRD Kilat (Manual Fix)
      shell: powershell
      run: |
        $msiPath = "$env:TEMP\crd.msi"
        # Download CRD buat Windows
        Invoke-WebRequest -Uri "https://dl.google.com/dl/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
        Start-Process msiexec.exe -Wait -ArgumentList "/i $msiPath /qn"
        
    - name: 2. Eksekusi Kode Google
      shell: powershell
      run: |
        # Menjalankan perintah CRD yang kamu masukkan di input
        ${{ github.event.inputs.crd_code }} --pin=123456 --name=GHOST-SULTAN-ZAN

    - name: 3. Pasukan Hantu (Install VirtualBox & ISO)
      shell: powershell
      run: |
        # Download VirtualBox Silent Install
        Invoke-WebRequest -Uri "https://download.virtualbox.org/virtualbox/7.0.14/VirtualBox-7.0.14-161095-Win.exe" -OutFile "$env:TEMP\vbox.exe"
        Start-Process "$env:TEMP\vbox.exe" -Wait -ArgumentList "--extract --silent"
        
        # Download ISO Windows 10 Pro (Ban serep kalo link pertama batuk)
        Invoke-WebRequest -Uri "https://bit.ly/win10-iso-direct" -OutFile "C:\win10.iso"
        
        Write-Host "✅ SEMUA SIAP! Silakan buka CRD kamu sekarang."
        Write-Host "Buka VirtualBox di dalam Windows Server dan hajar Windows 10 Pro-nya!"

    - name: 4. Jaga Lilin (Biar gak mati 6 jam)
      shell: powershell
      run: |
        $i = 0
        while ($i -lt 360) {
          Write-Host "Ghost Ninja masih aktif... Menit ke-$i"
          Start-Sleep -Seconds 60
          $i++
        }
        
