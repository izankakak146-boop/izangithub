name: Windows-Ghost-Ninja-Direct
on: 
  workflow_dispatch:
    inputs:
      crd_code:
        description: 'Masukkan perintah Windows (PowerShell) dari CRD'
        required: true
        default: ''

jobs:
  run-ghost:
    runs-on: windows-latest
    steps:
    - name: 1. Instalasi CRD & Aktifkan Desktop
      shell: powershell
      run: |
        $msiPath = "$env:TEMP\crd.msi"
        # Download & Install CRD
        Invoke-WebRequest -Uri "https://dl.google.com/dl/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
        Start-Process msiexec.exe -Wait -ArgumentList "/i $msiPath /qn"
        
        # Jalankan perintah CRD yang kamu masukkan (Inget: Pilih yang versi Windows di web CRD!)
        ${{ github.event.inputs.crd_code }} --pin=123456 --name=GHOST-SULTAN-ZAN
        
    - name: 2. Jaga Lilin (Sesi 6 Jam)
      shell: powershell
      run: |
        Write-Host "✅ GHOST NINJA ONLINE! Silakan cek web CRD kamu."
        $i = 0
        while ($i -lt 360) {
          Write-Host "Ghost Ninja masih bernapas... Menit ke-$i"
          Start-Sleep -Seconds 60
          $i++
        }
        
