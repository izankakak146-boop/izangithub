name: Windows Ghost Experiment
on: [push, workflow_dispatch]

jobs:
  run-ghost:
    runs-on: windows-latest  # Ini yang pakai Windows Server sakti itu
    steps:
      - name: Persiapan Script Hantu
        shell: powershell
        run: |
          # Buat file VBS yang tadi kita obrolin
          $vbsContent = 'x = MsgBox("ADA HANTU DI BELAKANG!", 16, "SISTEM ERROR")'
          Set-Content -Path "$env:USERPROFILE\Desktop\hantu.vbs" -Value $vbsContent

      - name: Jalankan Remote Desktop (CRD/Lainnya)
        shell: powershell
        run: |
          # MASUKKAN PERINTAH PENYIAPAN CRD KAMU DI SINI
          # Yang pakai kode dari desktop.google.com/headless itu
          # Paste kode "DISPLAY=" atau perintah PowerShell-nya di bawah ini:
          
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0Aci98E9wECFShka07uDLCfBZyOXg-Ufz4EpaxEo9UQUwT44NxSjeiXFAGsAEhrmpnuAb-A" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Tunggu Koneksi
        shell: powershell
        run: |
          Write-Host "Silakan buka Chrome Remote Desktop di HP kamu!"
          # Perintah ini biar runner-nya nggak langsung mati (nunggu 6 jam)
          sleep 21600 
          
