name: Windows Ghost Experiment
on: [push, workflow_dispatch]

jobs:
  run-ghost:
    runs-on: windows-latest
    steps:
      - name: 1. Setup & Install CRD
        shell: powershell
        run: |
          $msiPath = "$env:TEMP\crd.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
          Start-Process msiexec.exe -Wait -ArgumentList "/i $msiPath /qn /norestart"
          Write-Host "CRD Berhasil Terinstal!"

      - name: 2. Jalankan Host dengan Auto-PIN
        shell: powershell
        run: |
          # --- TEMPAT PASTE KODE ---
          $GoogleCode = '& "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0Aci98E8AmJDkUUE0gbJAKE7MqUL48TYEbsuwcuDg42gB831w7dGFVHjKyc_gWSxNh0jIVQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME'
          # -------------------------

          # Saya yang urus penambahan PIN-nya di sini!
          $FinalCommand = $GoogleCode + ' --pin=123456'
          Invoke-Expression $FinalCommand
          Write-Host "Host Berhasil Dijalankan dengan PIN: 123456"

      - name: 3. Buat Senjata Hantu
        shell: powershell
        run: |
          $vbsPath = "$env:USERPROFILE\Desktop\hantu.vbs"
          'x = MsgBox("HANTU WINDOWS BERAKSI!", 16, "SISTEM ERROR")' | Out-File -FilePath $vbsPath -Encoding ascii
          Write-Host "File VBS sudah siap di Desktop!"

      - name: 4. Menunggu Koneksi (6 Jam)
        shell: powershell
        run: Start-Sleep -Seconds 21600
        
