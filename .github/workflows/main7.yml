name: Android 6H Anti-Ngeframe
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y x11vnc xvfb adb scrcpy jq
          sudo npm install -g localtunnel

      - name: 🧹 SAPU BERSIH TOTAL
        run: |
          # Hapus semua sisa biar gak ada error 'more than one device'
          docker rm -f $(docker ps -aq) || true
          adb kill-server || true

      - name: Launch Android (Full Power)
        run: |
          docker run -d --privileged \
            --name android_lancar \
            -p 5555:5555 \
            redroid/redroid:8.1.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=30 \
            redroid.gpu.mode=guest

      - name: 🚀 PEMANASAN MESIN & KONEKSI
        run: |
          Xvfb :1 -screen 0 480x854x16 &
          echo "Menunggu Android bangun (45 detik)..."
          # Kita kasih waktu lebih lama biar gak failed connect lagi
          sleep 45
          adb start-server
          
          echo "Mencoba paksa koneksi ke localhost:5555..."
          # Loop 30 kali (sekitar 2-3 menit) sampai bener-bener nyambung
          for i in {1..30}; do
            if adb connect localhost:5555; then
              echo "✅ AKHIRNYA KONEK!"
              break
            fi
            echo "Gagal ke-$i, coba lagi..."
            sleep 5
          done
          
          adb -s localhost:5555 wait-for-device
          # FPS 30 biar lancar jaya di Advan X1 kamu
          DISPLAY=:1 scrcpy -s localhost:5555 --max-fps 30 --bit-rate 4M --always-on-top &
          sleep 5
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900

      - name: Buka Jalur Localtunnel
        run: |
          echo "===================================================="
          echo "PASSWORD IP (CEK DULU):"
          curl -s https://loca.lt/mytunnelpassword
          echo -e "\n===================================================="
          nohup lt --port 5900 > lt.log 2>&1 &
          sleep 10
          echo "ALAMAT UNTUK RVNC VIEWER:"
          cat lt.log | grep -o 'https://[^ ]*'
          echo "===================================================="

      - name: 🕒 STANDBY 6 JAM
        run: sleep 21600
        
