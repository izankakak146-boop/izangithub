name: Direct Android Browser
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install ws-scrcpy & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y adb jq
          # Install penampil android khusus browser
          sudo npm install -g ws-scrcpy

      - name: Launch Android Container
        run: |
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:8.1.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=15

      - name: Connect & Start Bridge
        run: |
          # Tunggu android nyala sebentar
          sleep 10
          adb connect localhost:5555
          adb wait-for-device
          # Jalankan server penampil browser di port 8000
          nohup ws-scrcpy > /dev/null 2>&1 &
          sleep 5

      - name: Setup Ngrok Direct
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y
          ngrok config add-authtoken 3BZhrzDBuVx4pbuzHO2DYa2J0Id_9nDuXkN5mLdKDFsvUZRz
          # Ngrok langsung tembak ke port penampil (8000)
          ngrok http 8000 --log=stdout &
          sleep 10
          echo "===================================================="
          echo "KLIK LINK INI DI BROWSER HP:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          echo "===================================================="

      - name: Keep Alive
        run: sleep 21600
        
