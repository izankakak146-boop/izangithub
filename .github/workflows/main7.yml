name: Windows Ghost Ninja
on: 
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Tempel Kode PowerShell dari Google di Sini'
        required: true

jobs:
  run-ghost:
    runs-on: windows-latest
    steps:
      - name: 1. Instalasi CRD Kilat
        shell: powershell
        run: |
          # Pakai choco biar gak download manual, jauh lebih stabil
          choco install google-chrome-remote-desktop -y
          Write-Host "CRD Berhasil Terinstal!"

      - name: 2. Eksekusi Kode Google
        shell: powershell
        run: |
          # Kita pakai @' '@ (Here-String) biar tanda kutip di kode Google gak bikin error
          $GoogleCode = @'
          ${{ github.event.inputs.auth_code }}
          '@
          
          $FinalCommand = $GoogleCode.Trim() + ' --pin=123456'
          Invoke-Expression $FinalCommand
          Write-Host "Host Berhasil Dijalankan! PIN: 123456"

      - name: 3. Pasukan Hantu
        shell: powershell
        run: |
          $vbsPath = "$env:USERPROFILE\Desktop\hantu.vbs"
          'x = MsgBox("HANTU WINDOWS BERAKSI!", 16, "SISTEM ERROR")' | Out-File -FilePath $vbsPath -Encoding ascii
          Start-Sleep -Seconds 21600
          
