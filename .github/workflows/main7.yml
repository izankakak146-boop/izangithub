name: Android 6H Cloudflared
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y x11vnc xvfb adb scrcpy
          # Download Cloudflared (Argo Tunnel)
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 🧹 Bersihkan Hantu
        run: |
          docker rm -f $(docker ps -aq) || true
          adb kill-server || true

      - name: Launch Android Full Power
        run: |
          docker run -d --privileged \
            --name android_utama \
            -p 5555:5555 \
            redroid/redroid:8.1.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=30 \
            redroid.gpu.mode=guest

      - name: 🚀 Koneksi Paksa & VNC
        run: |
          Xvfb :1 -screen 0 480x854x16 &
          sleep 30
          adb start-server
          # Gebukin koneksi sampai tembus
          until adb connect localhost:5555; do echo "Nunggu Android..."; sleep 5; done
          adb wait-for-device
          DISPLAY=:1 scrcpy -s localhost:5555 --max-fps 30 --bit-rate 4M --always-on-top &
          sleep 5
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900

      - name: 🌐 Buka Jalur Cloudflared (No-Nyangkut)
        run: |
          echo "============================================"
          echo "MENYIAPKAN LINK CLOUDFLARE..."
          # Jalankan tunnel tanpa butuh login/token
          nohup cloudflared tunnel --url tcp://localhost:5900 > cloudflare.log 2>&1 &
          sleep 10
          echo "ALAMAT UNTUK RVNC VIEWER:"
          # Cari link .trycloudflare.com di log
          grep -o 'tcp://[a-zA-Z0-9.-]*\.trycloudflare\.com:[0-9]*' cloudflare.log || echo "Gagal dapet link, coba cek log manual"
          echo "============================================"

      - name: 🕒 STANDBY 6 JAM
        run: sleep 21600
        
