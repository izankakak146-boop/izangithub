name: Android 6H FINAL - Link Langsung Muncul
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Persiapan Alat
        run: |
          sudo apt-get update
          sudo apt-get install -y x11vnc xvfb adb scrcpy
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 2. 🧹 Bersih Total
        run: |
          docker rm -f $(docker ps -aq) || true
          adb kill-server || adb start-server
          sudo fuser -k 5555/tcp || true

      - name: 3. Launch Android 11
        run: |
          docker run -d --privileged --name android_izan -p 5555:5555 \
          redroid/redroid:11.0.0-latest \
          androidboot.redroid_width=480 androidboot.redroid_height=854 \
          androidboot.redroid_fps=30 redroid.gpu.mode=guest

      - name: 4. 🚀 Bangunkan Android
        run: |
          Xvfb :1 -screen 0 480x854x16 &
          sleep 15
          adb connect localhost:5555 || true
          adb wait-for-device
          adb shell input keyevent 26
          DISPLAY=:1 scrcpy -s localhost:5555 --max-fps 30 --bit-rate 4M --always-on-top &
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900

      - name: 🌐 KLIK DISINI - LINK RVNC AKAN MUNCUL DIBAWAH
        run: |
          nohup cloudflared tunnel --url tcp://localhost:5900 > cf.log 2>&1 &
          echo "Sedang memancing link... Tunggu 30 detik."
          for i in {1..15}; do
            sleep 5
            LINK=$(grep -o '[a-zA-Z0-9.-]*\.trycloudflare\.com:[0-9]*' cf.log | head -n 1)
            if [ ! -z "$LINK" ]; then
              echo "===================================================="
              echo "✅ LINK BERHASIL DIDAPAT!"
              echo "ALAMAT RVNC: $LINK"
              echo "===================================================="
              # Trik Brutal: Masukkan link ke ringkasan workflow agar langsung kelihatan
              echo "### ✅ ALAMAT RVNC: \`$LINK\`" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "Percobaan $i: Link belum keluar..."
          done
          echo "❌ Gagal pancing link. Coba jalankan ulang." && exit 1

      - name: 🕒 Jaga Server (6 Jam)
        run: sleep 21600
        
