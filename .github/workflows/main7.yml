name: Android 6H Clean VNC
on: 
  workflow_dispatch:

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y x11vnc xvfb adb scrcpy jq
          sudo npm install -g localtunnel

      - name: 🧹 BERSIHKAN TOTAL SISA EMULATOR
        run: |
          echo "Menghapus semua hantu emulator..."
          # Hapus semua container yang nyangkut
          docker rm -f $(docker ps -aq) || true
          docker network prune -f || true
          # Matikan ADB lama
          adb kill-server || true

      - name: Setup Android Segar
        run: |
          docker run -d --privileged \
            --name android_utama \
            -p 5555:5555 \
            redroid/redroid:8.1.0-latest \
            androidboot.redroid_width=480 \
            androidboot.redroid_height=854 \
            androidboot.redroid_fps=15 \
            redroid.gpu.mode=guest

      - name: Koneksi & VNC
        run: |
          Xvfb :1 -screen 0 480x854x16 &
          sleep 10
          adb start-server
          
          echo "Menghubungkan ke Android..."
          # Loop sampai bener-bener konek ke localhost:5555
          until adb connect localhost:5555; do
            echo "Gagal, coba lagi..."
            sleep 2
          done
          
          adb -s localhost:5555 wait-for-device
          DISPLAY=:1 scrcpy -s localhost:5555 --max-fps 15 --bit-rate 1.5M --always-on-top &
          sleep 5
          x11vnc -display :1 -nopw -listen localhost -forever -bg -rfbport 5900

      - name: Buka Jalur & Tunnel Password
        run: |
          echo "===================================================="
          echo "IP UNTUK PASSWORD LOCALTUNNEL (JIKA DIMINTA):"
          curl -s https://loca.lt/mytunnelpassword
          echo -e "\n===================================================="
          # Menjalankan tunnel di background agar step berikutnya bisa jalan
          nohup lt --port 5900 > lt.log 2>&1 &
          sleep 5
          echo "LINK VNC KAMU:"
          cat lt.log | grep -o 'https://[^ ]*'
          echo "===================================================="

      - name: 🕒 KEEP ALIVE (6 JAM)
        run: |
          echo "Android sedang berjalan... Server akan tetap online selama 6 jam."
          echo "Silakan gunakan RVNC Viewer kamu."
          # Ini perintah biar nggak mati 1 detik kemudian
          sleep 21600
          
